# Dev shared Grafana overlay, layered in by the dev-* monitoring recipes;
# feature overlays (alerts, rig-telemetry) contribute their own provisioning.
services:
  grafana:
    extends:
      file: ./docker-compose.base.yaml
      service: grafana
    environment:
      # db creds for dev only
      GRAFANA_DB_NAME: "${DB_NAME:-fleet}"
      GRAFANA_DB_USERNAME: "${GRAFANA_DB_USERNAME:-fleet}"
      GRAFANA_DB_PASSWORD: "${GRAFANA_DB_PASSWORD:-fleet}"
      GF_SECURITY_ADMIN_PASSWORD: localdev-grafana-admin-not-for-prod
      GF_SECURITY_SECRET_KEY: localdev-grafana-secret-key-not-for-prod
    volumes:
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/provisioning/datasources/timescaledb.yaml:/etc/grafana/provisioning/datasources/timescaledb.yaml:ro
    ports:
      - "127.0.0.1:3030:3000"

volumes:
  grafana-data:

networks:
  monitoring:
    driver: bridge
