# Dev rig telemetry overlay (just dev-rig-telemetry / dev-monitoring): the
# bridge streams fake rigs' OTLP to an external Prometheus you run yourself
# (rig-otlp-bridge/dev-config/config.json points at host.docker.internal:9090;
# start one with --web.enable-otlp-receiver). The dev-only API key in that
# config is seeded once with `just dev-bridge-key`.
services:
  rig-otlp-bridge:
    build:
      context: .
      dockerfile: rig-otlp-bridge/Dockerfile
    environment:
      OTLP_BRIDGE_CONFIG: /etc/rig-otlp-bridge/config.json
    volumes:
      # Directory mount so in-tree config edits land on container restart.
      - ./rig-otlp-bridge/dev-config:/etc/rig-otlp-bridge:ro
    depends_on:
      - fleet-api
    extra_hosts:
      # Reach a host-run Prometheus from inside the container on Linux too.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    mem_limit: 512m
    networks:
      # Reaches fleet-api and the fake rigs' telemetry streams.
      - fleet-network
