# Dev rig telemetry overlay (just dev-rig-telemetry / dev-monitoring): the
# bridge streams paired rigs' OTLP into Prometheus; needs the grafana overlay.
services:
  rig-otlp-bridge:
    build:
      context: .
      dockerfile: rig-otlp-bridge/Dockerfile
    environment:
      OTLP_BRIDGE_FLEET_API_URL: "http://fleet-api:4000"
      # Dev-only: fleet-api is a container-network hostname, not loopback.
      OTLP_BRIDGE_FLEET_API_INSECURE_HTTP: "true"
      # Fake rigs serve their REST API on 8080 over plain http.
      OTLP_BRIDGE_API_PORT: "8080"
      # Dev-only API key; seed it once with `just dev-bridge-key`.
      OTLP_BRIDGE_FLEET_API_TOKEN: fleet_deadbeef_localdev-rig-telemetry-bridge-key-not-for-production
      OTLP_BRIDGE_OTLP_ENDPOINT: "http://prometheus:9090/api/v1/otlp/v1/metrics"
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    networks:
      # fleet-network: reaches fleet-api and the fake rigs' telemetry
      # streams; monitoring: reaches prometheus.
      - fleet-network
      - monitoring

  prometheus:
    extends:
      file: ./docker-compose.base.yaml
      service: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      # Loopback-only: the OTLP receiver is unauthenticated.
      - "127.0.0.1:9090:9090"

  grafana:
    volumes:
      - ./monitoring/grafana/provisioning/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  prometheus-data:

networks:
  monitoring:
    driver: bridge
