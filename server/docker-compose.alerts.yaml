# Dev alerts overlay (just dev-alerts / dev-monitoring): alerts-specific
# pieces only; requires docker-compose.grafana.yaml layered in first.
services:
  fleet-api:
    environment:
      FLEET_TELEMETRY_ENABLED: "${FLEET_TELEMETRY_ENABLED:-true}"
      FLEET_ALERTS_ENABLED: "${FLEET_ALERTS_ENABLED:-true}"
      FLEET_ALERTS_FLUSH_INTERVAL: "${FLEET_ALERTS_FLUSH_INTERVAL:-5s}"
      FLEET_ALERTS_BUFFER_SIZE: "${FLEET_ALERTS_BUFFER_SIZE:-4096}"
      FLEET_ALERTS_GRAFANA_USER: "${FLEET_ALERTS_GRAFANA_USER:-admin}"
      FLEET_ALERTS_GRAFANA_PASSWORD: localdev-grafana-admin-not-for-prod
      FLEET_ALERTS_WEBHOOK_TOKEN: localdev-webhook-token-not-for-prod
      FLEET_ALERTS_ALLOW_PRIVATE_DESTINATIONS: "${FLEET_ALERTS_ALLOW_PRIVATE_DESTINATIONS:-true}"
      FLEET_PUBLIC_URL: "${FLEET_PUBLIC_URL:-http://localhost:8080}"
    depends_on:
      otel-collector:
        condition: service_started
      grafana:
        condition: service_healthy
    networks:
      - monitoring

  otel-collector:
    extends:
      file: ./docker-compose.base.yaml
      service: otel-collector
    depends_on:
      - jaeger
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"

  jaeger:
    extends:
      file: ./docker-compose.base.yaml
      service: jaeger
    ports:
      - "127.0.0.1:16686:16686" # UI

  grafana:
    environment:
      FLEET_ALERTS_WEBHOOK_TOKEN: localdev-webhook-token-not-for-prod
    volumes:
      - ./monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro

networks:
  monitoring:
    driver: bridge
