services:
  fleet-api:
    environment:
      AUTH_CLIENT_EXPIRATION_PERIOD: "24h"
      AUTH_MINER_EXPIRATION_PERIOD: "24h"
      DB_NAME: "fleet"
      DB_ADDRESS: "timescaledb:5432"
      DB_USERNAME: "fleet"
      DB_PASSWORD: "fleet"
      DB_SSL_MODE: "disable"
      HTTP_LISTEN_ADDRESS: "0.0.0.0:4000"
      LOG_LEVEL: "INFO"
      FLEET_COMMAND_MAX_WORKERS: "500"
      FLEET_COMMAND_MASTER_POLLING_INTERVAL: "1s"
      FLEET_COMMAND_WORKER_EXECUTION_TIMEOUT: "30s"
      FLEET_COMMAND_BATCH_STATUS_UPDATE_POLLING_INTERVAL: "1s"
      FLEET_QUEUE_DEQUE_LIMIT: "500"
      FLEET_QUEUE_MAX_FAILURE_RETRIES: "5"
      # Notifications/monitoring sidecars (Epic A). Set to "false" to skip
      # starting otel-collector / victoria-metrics / vmalert / alertmanager
      # and disable the notifications surface in the API. Defaults to "true".
      FLEET_NOTIFICATIONS_ENABLED: "${FLEET_NOTIFICATIONS_ENABLED:-true}"
      # Endpoints fleet-api uses to reach the monitoring sidecars. These names
      # resolve via docker DNS in the dev compose (where fleet-api joins the
      # `monitoring` network) and via `extra_hosts` overrides in the host-
      # networked production compose.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      FLEET_VMALERT_URL: "http://vmalert:8880"
      FLEET_ALERTMANAGER_URL: "http://alertmanager:9093"
      # HTTP_PPROF_ADDR: "0.0.0.0:6060"  # Uncomment to enable pprof debug server; port mapping below restricts access to host loopback only
    # ports:
    #   - "127.0.0.1:6060:6060"  # pprof debug server (requires HTTP_PPROF_ADDR=0.0.0.0:6060)
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # TimescaleDB (PostgreSQL with time-series extension)
  # Custom lightweight image (~123 MB) replacing timescale/timescaledb-ha (~1.67 GB)
  # Includes PostgreSQL 18, TimescaleDB, and timescaledb_toolkit — without HA bloat
  timescaledb:
    restart: always
    environment:
      POSTGRES_DB: "fleet"
      POSTGRES_USER: "fleet"
      POSTGRES_PASSWORD: "fleet"
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "timescaledb.max_background_workers=8"
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
    healthcheck:
      test:
        ["CMD-SHELL", "psql -U fleet -d fleet -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fleet-network

  # ---------------------------------------------------------------------------
  # Notifications/monitoring sidecars (Epic A).
  #
  # These four services form the alerting pipeline:
  #
  #   fleet-api  --OTLP-->  otel-collector  --OTLP-->  victoria-metrics
  #                                                          ^   ^
  #                                                          |   | reads
  #                                                          |   |
  #                                                          |   vmalert ---> alertmanager
  #                                                          |   ^             |
  #                                                          |   | rules.yml   | webhook
  #                                                          |   |             v
  #                                                          +---+----------- fleet-api (activity log)
  #
  # All four sidecars stay on the `monitoring` docker network and never declare
  # ports on the host (only `expose:`). Inter-sidecar traffic uses docker DNS;
  # fleet-api reaches them either by joining the same network (dev compose) or
  # via 127.0.0.1 host bindings (production compose, where fleet-api uses
  # `network_mode: host`). Disabling sidecars at deploy time is done via the
  # `notifications` profile, gated by FLEET_NOTIFICATIONS_ENABLED.
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    command: [ "--config", "/etc/otelcol-contrib/config.yaml" ]
    expose:
      - "4317"  # OTLP gRPC ingest
      - "4318"  # OTLP HTTP ingest
      - "13133" # health_check extension (probed externally — see below)
    # The contrib image is distroless and ships no shell or wget, so we
    # cannot run an HTTP probe against the health_check extension from
    # inside the container. Dependents wait on `service_started` instead.
    # The MonitoringStackDegraded self-monitoring alert (Issue 3) catches
    # the case where the collector is up but not actually ingesting.
    healthcheck:
      disable: true
    restart: unless-stopped
    profiles:
      - notifications
    networks:
      - monitoring

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.107.0
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:8428"
      - "-promscrape.config="
    expose:
      - "8428" # write + query API (also the OTLP/HTTP ingest endpoint)
    volumes:
      - victoria-metrics-data:/storage
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8428/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    profiles:
      - notifications
    networks:
      - monitoring

  vmalert:
    image: victoriametrics/vmalert:v1.107.0
    depends_on:
      victoria-metrics:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    command:
      # User-rendered rule file (rewritten by the reload pipeline; Epic E).
      - "-rule=/etc/vmalert/rules.yml"
      # Built-in self-monitoring rules (always loaded, see Issue 3).
      - "-rule=/etc/vmalert/rules.d/*.yml"
      - "-notifier.url=http://alertmanager:9093"
      - "-datasource.url=http://victoria-metrics:8428"
      - "-remoteWrite.url=http://victoria-metrics:8428"
      - "-httpListenAddr=:8880"
    expose:
      - "8880" # API + reload endpoint
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8880/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    profiles:
      - notifications
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    expose:
      - "9093" # API + reload endpoint
    volumes:
      - alertmanager-data:/alertmanager
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9093/-/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    profiles:
      - notifications
    networks:
      - monitoring

volumes:
  timescaledb-data:
  victoria-metrics-data:
  alertmanager-data:

networks:
  fleet-network:
    driver: bridge
  monitoring:
    driver: bridge
    # Internal: no external connectivity. Sidecars are only reached from
    # fleet-api over service-name DNS (dev) or 127.0.0.1 loopback (prod).
    internal: false
