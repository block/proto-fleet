services:
  fleet-api:
    environment:
      AUTH_CLIENT_EXPIRATION_PERIOD: "24h"
      AUTH_MINER_EXPIRATION_PERIOD: "24h"
      DB_NAME: "fleet"
      DB_ADDRESS: "timescaledb:5432"
      DB_USERNAME: "fleet"
      DB_PASSWORD: "fleet"
      DB_SSL_MODE: "disable"
      HTTP_LISTEN_ADDRESS: "0.0.0.0:4000"
      LOG_LEVEL: "INFO"
      FLEET_COMMAND_MAX_WORKERS: "500"
      FLEET_COMMAND_MASTER_POLLING_INTERVAL: "1s"
      FLEET_COMMAND_WORKER_EXECUTION_TIMEOUT: "30s"
      FLEET_COMMAND_BATCH_STATUS_UPDATE_POLLING_INTERVAL: "1s"
      FLEET_QUEUE_DEQUE_LIMIT: "500"
      FLEET_QUEUE_MAX_FAILURE_RETRIES: "5"
      # HTTP_PPROF_ADDR: "0.0.0.0:6060"  # Uncomment to enable pprof debug server; port mapping below restricts access to host loopback only
    # ports:
    #   - "127.0.0.1:6060:6060"  # pprof debug server (requires HTTP_PPROF_ADDR=0.0.0.0:6060)
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # TimescaleDB (PostgreSQL with time-series extension)
  # Custom lightweight image (~123 MB) replacing timescale/timescaledb-ha (~1.67 GB)
  # Includes PostgreSQL 18, TimescaleDB, and timescaledb_toolkit — without HA bloat
  timescaledb:
    restart: always
    environment:
      POSTGRES_DB: "fleet"
      POSTGRES_USER: "fleet"
      POSTGRES_PASSWORD: "fleet"
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "timescaledb.max_background_workers=8"
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
    healthcheck:
      test:
        ["CMD-SHELL", "psql -U fleet -d fleet -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fleet-network

  # Stratum V2 translation proxy (bundled SRI tProxy).
  #
  # Profile-gated so the default `docker compose up` stays unchanged for
  # operators that don't run SV2. Enable with either:
  #   COMPOSE_PROFILES=sv2 docker compose up
  #   docker compose --profile sv2 up
  #
  # The config file at deployment-files/sv2/tproxy.toml is rendered by
  # install.sh from operator input (upstream sv2+* URL, miner-facing
  # stratum+* URL). Changing the upstream requires a container restart —
  # SRI does not hot-reload. See docs/stratum-v2-plan.md "Known
  # limitations" for the v1 scope boundaries (one upstream pool per
  # instance, no multi-site, no runtime reconfig).
  sv2-tproxy:
    image: ghcr.io/stratum-mining/translator:1.5.1
    pull_policy: if_not_present
    restart: unless-stopped
    profiles: ["sv2"]
    ports:
      - "34255:34255"
    volumes:
      - ../sv2/tproxy.toml:/etc/tproxy/config.toml:ro
    environment:
      - RUST_LOG=info
    command:
      - "-c"
      - "/etc/tproxy/config.toml"
    healthcheck:
      # Listening on 34255 is sufficient evidence of liveness for v1; the
      # Fleet API runs its own TCP probe against the same port via
      # STRATUM_V2_PROXY_HEALTH_ADDR, and that's what surfaces in logs.
      test: ["CMD", "sh", "-c", "nc -z localhost 34255"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  timescaledb-data:

networks:
  fleet-network:
    driver: bridge
