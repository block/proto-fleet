services:
  fleet-api:
    environment:
      AUTH_CLIENT_EXPIRATION_PERIOD: "24h"
      AUTH_MINER_EXPIRATION_PERIOD: "24h"
      DB_NAME: "fleet"
      DB_ADDRESS: "mysql:3306"
      HTTP_LISTEN_ADDRESS: "0.0.0.0:4000"
      LOG_LEVEL: "INFO"
      FLEET_COMMAND_MAX_WORKERS: "500"
      FLEET_COMMAND_MASTER_POLLING_INTERVAL: "1s"
      FLEET_COMMAND_WORKER_EXECUTION_TIMEOUT: "30s"
      FLEET_COMMAND_BATCH_STATUS_UPDATE_POLLING_INTERVAL: "1s"
      FLEET_QUEUE_DEQUE_LIMIT: "500"
      FLEET_QUEUE_MAX_FAILURE_RETRIES: "5"
      INFLUXDB3_URL: "http://influxdb:8181"
      INFLUXDB3_ORG: "fleet"
      INFLUXDB3_BUCKET: "fleet"
    cap_add:
      - NET_ADMIN
      - NET_RAW

  mysql:
    image: mysql:8.4.4
    restart: always
    environment:
      MYSQL_DATABASE: "fleet"
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "3306:3306"
    command: --sql-mode= --log-bin --binlog-format=ROW --server-id=1 --skip-name-resolve --explicit-defaults-for-timestamp=ON --max_connections=300
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - fleet-network

  influxdb:
    image: influxdb:3.2-core
    entrypoint: >
      /bin/sh -c "/var/lib/influxdb3/start/entry_point.sh"
    ports:
      - "8181:8181"
    environment:
      INFLUXDB_HTTP_PORT: 8181
      INFLUXDB_ORG: "fleet"
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: "influxdb1"
      INFLUXDB3_DISABLE_AUTHZ: "health"
      INFLUXDB3_OBJECT_STORE: "file"
      INFLUXDB3_DB_DIR: "/var/lib/influxdb3"
      INFLUXDB3_BUCKET: fleet
      INFLUXDB3_DATABASE_NAME: fleet
    volumes:
      - influxdb-data:/var/lib/influxdb3
      - influxdb-config:/etc/influxdb3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-network

  # TimescaleDB (PostgreSQL with time-series extension) - future replacement for MySQL/InfluxDB
  timescaledb:
    image: timescale/timescaledb:2.24.0-pg17
    restart: always
    environment:
      POSTGRES_DB: "fleet"
      POSTGRES_USER: "fleet"
      POSTGRES_PASSWORD: "fleet"
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "timescaledb.max_background_workers=8"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fleet-network

volumes:
  mysql:
  influxdb-data:
  influxdb-config:
  timescaledb-data:

networks:
  fleet-network:
    driver: bridge
