# Rig telemetry Prometheus: the rig-otlp-bridge sidecar streams rig OTLP,
# injects fleet context, and POSTs to the receiver at /api/v1/otlp/v1/metrics.

# Accept samples behind the head: rigs have no RTC, and pre-NTP timestamps
# would otherwise be rejected as out-of-order and silently dropped.
storage:
  tsdb:
    out_of_order_time_window: 15d

# Promote chosen resource attributes onto series labels so dashboards can
# filter without joining through target_info.
otlp:
  promote_resource_attributes:
    # Set by the rig's own services.
    - service.name
    - service.instance.id
    # Injected by the rig-otlp-bridge sidecar.
    - hostname
    - rig_ip
    - site
    - device_identifier
    - building
    - rack
    - zone

scrape_configs:
  # Self-scrape only; rig metrics arrive via OTLP push from the
  # rig-otlp-bridge sidecar.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
