apiVersion: 1

datasources:
  # Rig telemetry metrics store; mounted only by the rig-telemetry overlay,
  # which also runs prometheus and the rig-otlp-bridge sidecar.
  - name: Prometheus
    uid: protofleet-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
