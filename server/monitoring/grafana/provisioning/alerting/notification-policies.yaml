# Root policy for the internal webhook; fleet-api reads this batch, writes history, and fans out to each org's channels (it no longer overrides Grafana's notification tree).
apiVersion: 1

policies:
  - orgId: 1
    receiver: protofleet-internal
    # Group per org so one outage yields one consolidated notification (and one Slack message)
    # per org, not one per device; fleet-api splits Firing/Resolved and caps the rendered list.
    group_by:
      - organization_id
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      # Curtailment state tracks the source in real time, so its alerts skip
      # the org batch; per-alertname groups keep Active and Unreachable from
      # gating each other's flushes.
      - receiver: protofleet-internal
        object_matchers:
          - ["template", "=~", "mqtt-curtailment|mqtt-disconnected"]
        group_by:
          - organization_id
          - alertname
          - kind
        group_wait: 5s
        group_interval: 30s
        repeat_interval: 1h
