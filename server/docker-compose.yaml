version: "3"

x-extends:
  file: ./docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./docker-compose.base.yaml
      service: fleet-api
    build:
      context: ..
      dockerfile: server/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .
    environment:
      AUTH_CLIENT_SECRET_KEY: "00000000000000000000000000000000000000000000"
      AUTH_CLIENT_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      AUTH_MINER_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      DB_USERNAME: "root"
      DB_PASSWORD: ""
      PAIRING_SECRET_KEY: "00000000000000000000000000000000000000000000"
      ENCRYPT_SERVICE_MASTER_KEY: "EV0g7BoFQnqshvzep9knZsUUmvsqSBsjDAJus7ri0B8="
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ./influx_config:/var/lib/fleet/start:ro
    restart: unless-stopped

  mysql:
    extends:
      file: ./docker-compose.base.yaml
      service: mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "1"
      MYSQL_LOG_CONSOLE: "1"
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]

  influxdb:
    extends:
      file: ./docker-compose.base.yaml
      service: influxdb
    volumes:
      - ./influx_config:/var/lib/influxdb3/start

  # Development-specific services
  mms:
    build:
      context: ../miner-firmware
      dockerfile: docker/sim/Dockerfile
      args:
        TYPE: "b3b-sim"
    expose:
      - 8080
      - 2121
    # Resource limits to prevent container overload when scaling
    mem_limit: 128M
    mem_reservation: 64M
    cpus: 0.25
    privileged: true
    deploy:
      replicas: 5 # Default is 5 instances, can be overridden with --scale
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW

  fake-antminer:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
    # Resource limits to prevent container overload when scaling
    mem_limit: 128M
    mem_reservation: 64M
    cpus: 0.25
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    deploy:
      replicas: 5 # Default is 5 instances, can be overridden with --scale
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  mysql:
  influxdb-data:
  influxdb-config:

networks:
  fleet-network:
    ipam:
      config:
        - subnet: "192.168.2.0/24"
          gateway: "192.168.2.1"
