x-extends:
  file: ./docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./docker-compose.base.yaml
      service: fleet-api
    build:
      context: ..
      dockerfile: server/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .
    environment:
      AUTH_CLIENT_SECRET_KEY: "00000000000000000000000000000000000000000000"
      AUTH_CLIENT_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      AUTH_MINER_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      DB_USERNAME: "root"
      DB_PASSWORD: ""
      PAIRING_SECRET_KEY: "00000000000000000000000000000000000000000000"
      ENCRYPT_SERVICE_MASTER_KEY: "EV0g7BoFQnqshvzep9knZsUUmvsqSBsjDAJus7ri0B8="
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ./influx_config:/var/lib/fleet/start:ro
    restart: unless-stopped
    networks:
      - fleet-network
    ports:
      - "4000:4000"

  mysql:
    extends:
      file: ./docker-compose.base.yaml
      service: mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "1"
      MYSQL_LOG_CONSOLE: "1"
      MYSQL_ROOT_HOST: "%"
      # Development performance optimizations
    command: >
      --sql-mode=
      --skip-name-resolve
      --innodb-flush-log-at-trx-commit=0
      --sync-binlog=0
      --innodb-doublewrite=0
      --disable-log-bin
      --tls-version=''
      --performance-schema=OFF
    volumes:
      - mysql:/var/lib/mysql
      # Use tmpfs for temporary files to speed up operations
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 100M
    # Faster health checks for development
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 5s

  influxdb:
    extends:
      file: ./docker-compose.base.yaml
      service: influxdb
    volumes:
      - ./influx_config:/var/lib/influxdb3/start
    # Faster health checks for development
    healthcheck:
      test: ["CMD", "curl", "-f", "-m", "2", "http://localhost:8181/health"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 3s

  # Development-specific services
  mms:
    build:
      context: ../miner-firmware
      dockerfile: docker/sim/Dockerfile
      args:
        TYPE: "b4-sim"
    expose:
      - 8080
      - 2121
    privileged: true
    deploy:
      replicas: 5 # Default is 5 instances, can be overridden with --scale
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    deploy:
      replicas: 5 # Default is 5 instances, can be overridden with --scale
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  proto-sim:
    build:
      context: ../miner-firmware
      dockerfile: docker/sim/Dockerfile
      args:
        TYPE: "b4-sim"
    ports:
      - "8080:8080"
      - "2121:2121"
    privileged: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  antminer-sim:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "4028:4028"
      - "8008:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
volumes:
  mysql:
  influxdb-data:
  influxdb-config:

networks:
  fleet-network:
    ipam:
      config:
        - subnet: "192.168.2.0/24"
          gateway: "192.168.2.1"
