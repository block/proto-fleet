x-extends:
  file: ./docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./docker-compose.base.yaml
      service: fleet-api
    build:
      context: ..
      dockerfile: server/Dockerfile.dev
      args:
        GO_GCFLAGS: "${GO_GCFLAGS:-}"
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - testing/
            - e2e/
            - plugins/
            - "**/*.http"
            - "**/*.md"
            - "**/*.yaml"
            - "**/*.yml"
            - "**/*.json"
            - "**/*.sh"
            - "**/Dockerfile*"
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: ../go.work
    environment:
      AUTH_CLIENT_SECRET_KEY: "${AUTH_CLIENT_SECRET_KEY:-00000000000000000000000000000000000000000000}"
      AUTH_CLIENT_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      AUTH_MINER_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      DB_USERNAME: "fleet"
      DB_PASSWORD: "fleet"
      ENCRYPT_SERVICE_MASTER_KEY: "EV0g7BoFQnqshvzep9knZsUUmvsqSBsjDAJus7ri0B8="
      PLUGINS_DIR: "/app/plugins"
      PLUGINS_ENABLED: "true"
      PROTO_MINER_PORT: "8080"
      FLEET_TELEMETRY_ENABLED: "true"
      FLEET_TELEMETRY_ENDPOINT: "http://otel-collector:4318"
    depends_on:
      timescaledb:
        condition: service_healthy
      otel-collector:
        condition: service_started
      # Notifications sidecars only present when the `notifications` profile
      # is active. `required: false` lets dev runs opt out by setting
      # FLEET_NOTIFICATIONS_ENABLED=false (see deployment-files/README.md).
      victoria-metrics:
        condition: service_healthy
        required: false
      vmalert:
        condition: service_healthy
        required: false
      alertmanager:
        condition: service_healthy
        required: false
    volumes:
      - ./plugins:/app/plugins:ro
      - ../deployment-files/server/monitoring/vmalert:/etc/protofleet/monitoring/vmalert:rw
      - ../deployment-files/server/monitoring/alertmanager:/etc/protofleet/monitoring/alertmanager:rw
    restart: unless-stopped
    networks:
      # In dev fleet-api joins both fleet-network (miners, db) and monitoring
      # (sidecars). In production fleet-api uses host networking and reaches
      # the sidecars via 127.0.0.1 instead.
      - fleet-network
      - monitoring
    ports:
      - "4000:4000"

  timescaledb:
    extends:
      file: ./docker-compose.base.yaml
      service: timescaledb
    build:
      context: ./timescaledb
    # Development performance optimizations
    # NOTE: This command completely overrides the base config. Keep work_mem in sync
    # with docker-compose.base.yaml (Docker Compose replaces arrays, doesn't merge them).
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "timescaledb.max_background_workers=4"
      - "-c"
      - "work_mem=32MB"
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
      # Use tmpfs for temporary files to speed up operations
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 256M
    # Faster health checks for development
    healthcheck:
      test: [ "CMD-SHELL", "psql -U fleet -d fleet -c 'SELECT 1' > /dev/null 2>&1" ]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 5s

  otel-collector:
    extends:
      file: ./docker-compose.base.yaml
      service: otel-collector
    # Dev stays bound on 127.0.0.1 for the OTLP ports so engineers running
    # tools on the host (e.g. otel-cli, telemetry replays) can hit the
    # collector without joining the docker network.
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      - jaeger
    volumes:
      # Dev config still ships traces to jaeger AND metrics to victoria-metrics
      # (production drops the jaeger fan-out).
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - fleet-network
      - monitoring

  victoria-metrics:
    extends:
      file: ./docker-compose.base.yaml
      service: victoria-metrics
    networks:
      - monitoring

  vmalert:
    extends:
      file: ./docker-compose.base.yaml
      service: vmalert
    volumes:
      - ../deployment-files/server/monitoring/vmalert/rules.yml:/etc/vmalert/rules.yml:rw
      - ../deployment-files/server/monitoring/vmalert/rules.d:/etc/vmalert/rules.d:ro
    networks:
      - monitoring

  alertmanager:
    extends:
      file: ./docker-compose.base.yaml
      service: alertmanager
    volumes:
      - ../deployment-files/server/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:rw
    networks:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "127.0.0.1:16686:16686" # UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    expose:
      - "4317"
      - "4318"
    restart: unless-stopped
    networks:
      - fleet-network

  # Development-specific services
  fake-proto-rig:
    build:
      context: ..
      dockerfile: server/fake-proto-rig/Dockerfile
    environment:
      HTTP_PORT: "8080"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 8080
    deploy:
      replicas: 5 # Default is 5 instances, can be overridden with --scale
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      USERNAME: "root19"
      PASSWORD: "root19"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-high-temp:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S17"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      ERROR_BOARD_TEMP: "96.0"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-hw-errors:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S21"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      ERROR_HW_PERCENT: "6.5"
      ERROR_HW_COUNT: "1500"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-board-dead:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S21 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      USERNAME: "root21"
      PASSWORD: "root21"
      ERROR_BOARD_NOT_ALIVE: "true"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-pool-issues:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S17 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      USERNAME: "root17"
      PASSWORD: "root17"
      ERROR_POOL_NOT_ALIVE: "true"
      ERROR_POOL_GET_FAILURES: "15"
      ERROR_BOARD_NOT_HASHING: "true"
      ERROR_FAN_FAILED: "true"
      ERROR_PSU_FAULT: "true"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-rejected-shares:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S18"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      ERROR_REJECTED_PERCENT: "12.0"
      ERROR_STALE_COUNT: "150"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  proto-sim:
    build:
      context: ..
      dockerfile: server/fake-proto-rig/Dockerfile
    environment:
      HTTP_PORT: "8080"
      SERIAL_NUMBER: "PROTO-SIM-001"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  antminer-sim:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "4028:4028"
      - "8008:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
volumes:
  timescaledb-data:
  victoria-metrics-data:
  alertmanager-data:


networks:
  fleet-network:
    ipam:
      config:
        - subnet: "192.168.2.0/24"
          gateway: "192.168.2.1"
  monitoring:
    driver: bridge
