# Example: generating Python stubs from the plugin SDK proto.
#
# This file is not used directly by buf-gen-python (which uses buf export
# + grpc_tools.protoc). It serves as documentation for the intended
# generation scope.
#
# Usage (the SDK proto dir has its own buf.yaml):
#   buf-gen-python --output packages/proto-python-gen/demo/output \
#                  --buf-config server/sdk/v1/pb
#
# For protos under the main buf.yaml (proto/ directory):
#   buf-gen-python --output gen/python --buf-config . --path proto/telemetry
