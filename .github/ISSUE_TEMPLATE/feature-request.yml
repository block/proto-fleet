name: Feature Request
description: Suggest a new feature or improvement for Proto Fleet
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: Describe the problem you'd like solved or the motivation behind this request.
      placeholder: "As a fleet operator, I need to ___ because ___"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Proto Fleet does this relate to?
      options:
        - Client (Web UI)
        - Server (Go backend)
        - ASIC Plugin (asicrs/Rust)
        - Protobufs/API
        - Docker/Deployment
        - Other
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request.
    validations:
      required: false
