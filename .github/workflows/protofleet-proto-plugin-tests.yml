name: ProtoFleet proto plugin tests

on:
  pull_request:
    paths:
      - ".github/workflows/protofleet-proto-plugin-tests.yml"
      - "plugin/proto/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-proto-plugin-tests.yml"
      - "plugin/proto/**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Lint protocol buffers
        run: |
          just lint

      - name: Lint protocol golang
        run: |
          cd plugin/proto
          just lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin/proto
    steps:
      - name: Create GitHub App token
        id: create_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: "${{ steps.create_token.outputs.token }}"
          submodules: recursive

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Configure cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-workspace-${{ hashFiles('**/go.sum', 'go.work') }}
          restore-keys: |
            ${{ runner.os }}-go-workspace-
            ${{ runner.os }}-go-

      - name: Compile project
        run: just build

      - name: Wait for Docker daemon to be ready
        run: |
          echo "Waiting for Docker daemon to be ready..."
          for i in {1..30}; do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon is ready"
              break
            fi
            echo "Attempt $i: Docker daemon not ready, waiting 2 seconds..."
            sleep 2
          done

          # Verify Docker can pull images
          echo "Testing Docker image pull capability with hello-world..."
          docker pull hello-world:latest
          docker run --rm hello-world:latest
          echo "hello-world image works"

          # Test the specific Ubuntu image that testcontainers will use
          echo "Testing Ubuntu 22.04 image pull (used by testcontainers)..."
          if docker pull ubuntu:22.04; then
            echo "✅ Ubuntu 22.04 pulled successfully"
            docker run --rm ubuntu:22.04 echo "Ubuntu container test successful"
            echo "✅ Ubuntu 22.04 container runs successfully"
          else
            echo "❌ Failed to pull ubuntu:22.04 - this is likely the root cause"
            exit 1
          fi

          echo "Docker daemon is fully functional with all required images"

      - name: Ensure miner-firmware submodule is correct
        run: |
          echo "Ensure dist protoOS exists"

          mkdir -p ../../miner-firmware/docker/sim/protoOS/dist/protoOS

      - name: Run tests
        run: go test -timeout=30m ./...
