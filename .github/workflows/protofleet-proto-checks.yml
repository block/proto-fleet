name: Proto Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-proto-checks.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "buf.lock"
      - "buf.yaml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "proto/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  proto-lint:
    name: Protobuf Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Lint protobuf definitions
        run: buf lint
