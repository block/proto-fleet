name: Generated code check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generated-code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: create_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: "${{ steps.create_token.outputs.token }}"
          submodules: recursive

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Install dependencies
        run: just init

      - name: Generate code
        run: just gen

      - name: Check if committed generated code is up-to-date
        run: >
          git diff --quiet || {
            echo -e "\033[0;31mNewly generated code does not match the committed code. Run 'just gen', then commit and push the changes.\033[0m" 1>&2;
            echo -e "\n\n";
            git diff --exit-code
          }
