name: MDK API Docs

on:
  push:
    branches: [main]
    paths:
      - proto-rig-api/openapi/MDK-API.json
      - proto-rig-api/openapi/redocly.yaml
      - proto-rig-api/openapi/build-docs.sh
      - proto-rig-api/openapi/logo.svg
      - .github/workflows/mdk-api-docs.yml
  pull_request:
    paths:
      - proto-rig-api/openapi/MDK-API.json
      - proto-rig-api/openapi/redocly.yaml
      - proto-rig-api/openapi/build-docs.sh
      - proto-rig-api/openapi/logo.svg
      - .github/workflows/mdk-api-docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Redoc site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
      - name: Render branded API docs
        run: bash proto-rig-api/openapi/build-docs.sh _site
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}proto-api-docs/
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
