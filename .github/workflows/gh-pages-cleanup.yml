name: GitHub Pages Cleanup

on:
  schedule:
    # Daily cleanup (UTC)
    - cron: "15 5 * * *"
  workflow_dispatch:

env:
  # Maximum value is 100
  MAX_ACTIVE_PRS: 100
  # After how many days since last update is the PR no longer considered active
  PR_IS_STALE_AFTER_DAYS: 14

permissions:
  contents: write
  pull-requests: read

jobs:
  get-active-pr-numbers:
    runs-on: ubuntu-latest
    outputs:
      active-pr-numbers: ${{ steps.find-active-prs.outputs.result }}
    steps:
      - name: Find active PRs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: find-active-prs
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              // Because of fetching only a single page, the per_page controls how many PRs can have active deployments
              per_page: Number(process.env.MAX_ACTIVE_PRS),
              sort: "updated",
              direction: "desc"
            })

            const prIsStaleAfterMillis = Number(process.env.PR_IS_STALE_AFTER_DAYS) * 24 * 60 * 60 * 1000

            return prs.data
              .filter(pr => new Date() - new Date(pr.updated_at) < prIsStaleAfterMillis)
              .map(pr => pr.number)
              .join("|")

  delete-stale-gh-pages-e2e-reports:
    runs-on: ubuntu-latest
    needs: get-active-pr-numbers
    concurrency:
      group: gh-pages-cleanup
      cancel-in-progress: false
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Delete stale E2E reports
        shell: bash
        run: |
          set -euo pipefail

          ACTIVE_PR_NUMBERS='${{ needs.get-active-pr-numbers.outputs.active-pr-numbers }}'

          REPORT_ROOTS=("protoos-e2e-reports" "protofleet-e2e-reports")
          DELETED_COUNT=0

          # Ensure non-matching globs expand to an empty list instead of the literal pattern
          shopt -s nullglob

          for ROOT in "${REPORT_ROOTS[@]}"; do
            if [ ! -d "$ROOT" ]; then
              echo "No $ROOT directory found, skipping"
              continue
            fi

            echo "Scanning $ROOT for stale PR reports"
            pushd "$ROOT" > /dev/null

            for DIR in pr-*; do
              if [ ! -d "$DIR" ]; then
                continue
              fi

              PR_NUMBER="${DIR#pr-}"

              if [[ ! "|$ACTIVE_PR_NUMBERS|" == *"|$PR_NUMBER|"* ]]; then
                echo "Deleting stale report: $ROOT/$DIR (PR #$PR_NUMBER is closed/stale)"
                rm -rf "$DIR"
                DELETED_COUNT=$((DELETED_COUNT + 1))
              else
                echo "Keeping active report: $ROOT/$DIR (PR #$PR_NUMBER is active)"
              fi
            done

            popd > /dev/null
          done

          echo "Deleted $DELETED_COUNT stale E2E report(s)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$DELETED_COUNT" -gt 0 ]; then
            git add -A
            git commit -m "chore: clean up stale E2E reports for closed PRs"
            git push origin gh-pages
            echo "Pushed cleanup commit to gh-pages"
          else
            echo "No changes to commit"
          fi
