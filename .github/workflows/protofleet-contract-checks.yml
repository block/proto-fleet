name: Plugin Contract Checks

on:
  pull_request:
    paths:
      - ".github/workflows/protofleet-contract-checks.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "go.work"
      - "go.work.sum"
      - "justfile"
      - "tests/plugin-contract/**"
      - "server/go.mod"
      - "server/go.sum"
      - "server/sdk/**"
      - "plugin/asicrs/**"
      - "plugin/proto/**"
      - "plugin/antminer/**"
      - "sdk/rust/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-contract-checks.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "go.work"
      - "go.work.sum"
      - "justfile"
      - "tests/plugin-contract/**"
      - "server/go.mod"
      - "server/go.sum"
      - "server/sdk/**"
      - "plugin/asicrs/**"
      - "plugin/proto/**"
      - "plugin/antminer/**"
      - "sdk/rust/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Build plugins and run contract tests
        run: just test-contract
