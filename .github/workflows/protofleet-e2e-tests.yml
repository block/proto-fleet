name: ProtoFleet E2E Tests

on:
  pull_request:
    paths:
      - ".github/workflows/protofleet-e2e-tests.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "client/.npmrc"
      - "client/e2eTests/protoFleet/**"
      - "client/package.json"
      - "client/package-lock.json"
      - "client/postcss.config.js"
      - "client/public/**"
      - "client/src/protoFleet/**"
      - "client/src/shared/**"
      - "client/vite.config.ts"
      - "client/vitePlugins/**"
      - "client/tsconfig.json"
      - "client/tsconfig.node.json"
      - "go.work"
      - "go.work.sum"
      - "hermit-packages/**"
      - "plugin/antminer/**"
      - "plugin/proto/**"
      - "server/**"
  schedule:
    # Run daily at 6 AM UTC on main branch
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  e2e-tests:
    timeout-minutes: 40
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: [desktop, mobile]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-e2e-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-e2e-
            ${{ runner.os }}-buildx-

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Cache Node modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            client/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client/e2eTests/protoFleet
        run: npx playwright install --with-deps chromium

      - name: Build ProtoFleet
        working-directory: client
        run: |
          # Skip lint in CI to avoid import order issues from merged main branch
          npm run build:protoFleet

      - name: Build plugins for CI (Linux AMD64)
        run: |
          # CI runners use linux/amd64, not arm64
          # CGO_ENABLED=0 creates static binaries that work in Alpine (musl libc)
          echo "Syncing Go workspace..."
          go work sync
          echo "Building static plugins for Linux AMD64..."
          mkdir -p server/plugins
          (cd plugin/proto && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../server/plugins/proto-plugin .)
          (cd plugin/antminer && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../server/plugins/antminer-plugin .)
          chmod +x server/plugins/proto-plugin server/plugins/antminer-plugin
          echo "Plugins built successfully"

      - name: Start services (TimeScaleDB + Backend + Simulators)
        working-directory: server
        run: docker compose up -d

      - name: Start frontend
        working-directory: client
        env:
          VITE_VERSION: ${{ github.sha }}
          VITE_BUILD_DATE: ${{ github.event.repository.updated_at }}
          VITE_COMMIT: ${{ github.sha }}
        run: |
          # Start frontend in background (already built in earlier step)
          npx vite preview --mode protoFleet --port 5173 --host &
          VITE_PID=$!
          echo "Vite PID: $VITE_PID"

          # Wait for frontend to be ready
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -f http://localhost:5173 2>/dev/null; do sleep 2; done'
          echo "Frontend is ready!"

      - name: Run Playwright tests (${{ matrix.project }})
        working-directory: client/e2eTests/protoFleet
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-protofleet-${{ matrix.project }}
          path: client/e2eTests/protoFleet/playwright-report/
          retention-days: 30

      - name: Note PR report availability
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        run: |
          echo "## ProtoFleet E2E Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR runs keep Playwright HTML reports as workflow artifacts only." >> "$GITHUB_STEP_SUMMARY"
          echo "GitHub Pages publication is disabled on pull requests." >> "$GITHUB_STEP_SUMMARY"

      - name: Install Testmo CLI
        if: ${{ !cancelled() && github.event_name == 'schedule' }}
        run: |
          npm install -g @testmo/testmo-cli@1.0.0

      - name: Submit test results to Testmo
        if: ${{ !cancelled() && github.event_name == 'schedule' }}
        working-directory: client/e2eTests/protoFleet
        env:
          TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
        run: |
          # Add XML declaration if missing (Playwright sometimes omits it on CI)
          if ! head -n 1 test-results/results.xml | grep -q '<?xml'; then
            echo "XML declaration missing, adding it..."
            echo '<?xml version="1.0" encoding="UTF-8"?>' | cat - test-results/results.xml > test-results/results-fixed.xml
            mv test-results/results-fixed.xml test-results/results.xml
            echo "First 2 lines after fix:"
            head -n 2 test-results/results.xml
          else
            echo "XML declaration already present"
          fi

          testmo automation:run:submit \
            --instance https://proto.testmo.net \
            --project-id 2 \
            --name "ProtoFleet E2E Tests - ${{ matrix.project }} - $(date +'%Y-%m-%d %H:%M')" \
            --source "protofleet-e2e-tests-${{ matrix.project }}" \
            --results test-results/*.xml

      - name: Upload test screenshots
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-screenshots-protofleet-${{ matrix.project }}
          path: client/e2eTests/protoFleet/test-results/
          retention-days: 7

      - name: Dump backend logs on failure
        if: failure()
        working-directory: server
        run: |
          echo "=== Fleet API Logs ==="
          docker compose logs fleet-api
          echo "=== TimescaleDB Logs ==="
          docker compose logs timescaledb

      - name: Cleanup
        if: always()
        working-directory: server
        run: docker compose down -v

  publish-reports:
    name: Publish ProtoFleet E2E Reports
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions:
      contents: write
    concurrency:
      group: gh-pages-protofleet-e2e-reports
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Playwright reports
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: playwright-report-protofleet-*
          path: /tmp/playwright-reports

      - name: Determine report directory
        id: report-dir
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            REPORT_BASE_DIR="protofleet-e2e-reports/main"
          else
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9_-]/-/g')
            REPORT_BASE_DIR="protofleet-e2e-reports/branch-${BRANCH_NAME}"
          fi
          echo "desktop_dir=${REPORT_BASE_DIR}/desktop" >> $GITHUB_OUTPUT
          echo "mobile_dir=${REPORT_BASE_DIR}/mobile" >> $GITHUB_OUTPUT
          echo "Report will be published to: ${REPORT_BASE_DIR}"

      - name: Publish Playwright report to GitHub Pages (desktop)
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/playwright-reports/playwright-report-protofleet-desktop
          destination_dir: ${{ steps.report-dir.outputs.desktop_dir }}
          keep_files: false

      - name: Publish Playwright report to GitHub Pages (mobile)
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/playwright-reports/playwright-report-protofleet-mobile
          destination_dir: ${{ steps.report-dir.outputs.mobile_dir }}
          keep_files: false

      - name: Add job summary with test results
        run: |
          REPORT_URL_DESKTOP="https://btc-mining.github.io/proto-fleet/${{ steps.report-dir.outputs.desktop_dir }}"
          REPORT_URL_MOBILE="https://btc-mining.github.io/proto-fleet/${{ steps.report-dir.outputs.mobile_dir }}"

          echo "## 🎭 ProtoFleet E2E Test Results (desktop)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **[View Latest Published HTML Report](${REPORT_URL_DESKTOP})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Test artifacts:** Available in the artifacts section below" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 🎭 ProtoFleet E2E Test Results (mobile)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **[View Latest Published HTML Report](${REPORT_URL_MOBILE})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Test artifacts:** Available in the artifacts section below" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
