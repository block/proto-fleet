name: ProtoFleet Deploy to Raspberry Pi

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: string
      environment:
        description: 'Deployment environment (Raspberry Pi location)'
        required: true
        type: choice
        options:
          - pi-stl
          - pi-mar
          - pi-fxsj
          - pi-dalton

permissions:
  contents: read

jobs:
  build-proto-fleet-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25.4"

      - name: Build Golang server
        working-directory: ./server
        run: |
          go mod download
          GOOS=linux GOARCH=amd64 go build -v -o fleetd-amd64 ./cmd/fleetd
          GOOS=linux GOARCH=arm64 go build -v -o fleetd-arm64 ./cmd/fleetd
          echo "version: dev-${{ github.sha }}" > version.txt
          echo "branch: ${{ inputs.branch }}" >> version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> version.txt
          echo "commit: ${{ github.sha }}" >> version.txt

      - name: Build plugin binaries
        run: |
          echo "Syncing Go workspace..."
          go work sync
          echo "Building plugins for multiple architectures..."
          GOOS=linux GOARCH=amd64 go build -o server/proto-plugin-amd64 ./plugin/proto
          GOOS=linux GOARCH=amd64 go build -o server/antminer-plugin-amd64 ./plugin/antminer
          GOOS=linux GOARCH=arm64 go build -o server/proto-plugin-arm64 ./plugin/proto
          GOOS=linux GOARCH=arm64 go build -o server/antminer-plugin-arm64 ./plugin/antminer
          chmod +x server/proto-plugin-* server/antminer-plugin-*
          echo "Multi-arch plugins built successfully"

      - name: Package server binaries
        working-directory: ./server
        run: |
          tar -czf proto-fleet-server-dev.tar.gz \
            fleetd-amd64 fleetd-arm64 \
            proto-plugin-amd64 proto-plugin-arm64 \
            antminer-plugin-amd64 antminer-plugin-arm64 \
            version.txt

      - name: Upload server artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proto-fleet-server-artifact
          path: ./server/proto-fleet-server-dev.tar.gz
          retention-days: 1

  build-proto-fleet-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build ProtoFleet client
        working-directory: ./client
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export VITE_VERSION="dev-${{ github.sha }}"
          export VITE_BUILD_DATE="$BUILD_DATE"
          export VITE_COMMIT="${{ github.sha }}"
          npm run build:protoFleet

      - name: Create version file
        working-directory: ./client
        run: |
          echo "version: dev-${{ github.sha }}" > dist/protoFleet/version.txt
          echo "branch: ${{ inputs.branch }}" >> dist/protoFleet/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> dist/protoFleet/version.txt
          echo "commit: ${{ github.sha }}" >> dist/protoFleet/version.txt

      - name: Package ProtoFleet client
        working-directory: ./client
        run: |
          tar -czf proto-fleet-client-dev.tar.gz dist/protoFleet

      - name: Upload client artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proto-fleet-client-artifact
          path: ./client/proto-fleet-client-dev.tar.gz
          retention-days: 1

  build-deployment-bundle:
    runs-on: ubuntu-latest
    needs: [build-proto-fleet-server, build-proto-fleet-client]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Create deployment directory structure
        run: |
          mkdir -p deployment/server
          mkdir -p deployment/client
          mkdir -p deployment/server/influx_config
          touch deployment/server/influx_config/.env

      - name: Download server artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: proto-fleet-server-artifact
          path: /tmp

      - name: Download client artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: proto-fleet-client-artifact
          path: /tmp

      - name: Extract artifacts
        run: |
          tar -xzf /tmp/proto-fleet-server-dev.tar.gz -C deployment/server
          mkdir -p /tmp/client
          tar -xzf /tmp/proto-fleet-client-dev.tar.gz -C /tmp/client
          mkdir -p deployment/client/protoFleet
          cp -r /tmp/client/dist/protoFleet/* deployment/client/protoFleet/

      - name: Copy deployment configuration files
        run: |
          cp deployment-files/client/Dockerfile deployment/client/
          cp deployment-files/client/nginx.http.conf deployment/client/
          cp deployment-files/client/nginx.https.conf deployment/client/
          cp deployment-files/server/Dockerfile deployment/server/
          cp deployment-files/docker-compose.yaml deployment/
          cp server/docker-compose.base.yaml deployment/server/
          cp deployment-files/run-fleet.sh deployment/
          cp server/influx_config/entry_point.sh deployment/server/influx_config/
          cp server/influx_config/manage_token.sh deployment/server/influx_config/
          chmod +x deployment/run-fleet.sh

          if [[ -f deployment-files/server/influx_config/entry_point.sh ]]; then
            chmod +x deployment/server/influx_config/entry_point.sh
          fi
          if [[ -f deployment-files/server/influx_config/manage_token.sh ]]; then
            chmod +x deployment/server/influx_config/manage_token.sh
          fi

      - name: Create version file
        run: |
          echo "version: dev-${{ github.sha }}" > deployment/version.txt
          echo "branch: ${{ inputs.branch }}" >> deployment/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment/version.txt
          echo "commit: ${{ github.sha }}" >> deployment/version.txt

      - name: Package deployment bundle
        run: |
          tar -czf proto-fleet-deployment.tar.gz deployment

      - name: Upload deployment bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proto-fleet-deployment-bundle
          path: proto-fleet-deployment.tar.gz
          retention-days: 1

  deploy-to-pi:
    runs-on: ubuntu-latest
    needs: [build-deployment-bundle]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Download deployment bundle
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: proto-fleet-deployment-bundle
          path: .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_PRIVATE_KEY }}" > ~/.ssh/pi_key
          chmod 600 ~/.ssh/pi_key
          ssh-keyscan -H ${{ vars.PI_HOST }} >> ~/.ssh/known_hosts || true

      - name: Check SSH connection
        run: |
          ssh -i ~/.ssh/pi_key -o StrictHostKeyChecking=no ${{ vars.PI_USER }}@${{ vars.PI_HOST }} 'echo "SSH connection successful"'

      - name: Copy deployment bundle to Raspberry Pi
        run: |
          scp -i ~/.ssh/pi_key -o StrictHostKeyChecking=no \
            proto-fleet-deployment.tar.gz \
            ${{ vars.PI_USER }}@${{ vars.PI_HOST }}:/tmp/

      - name: Deploy on Raspberry Pi
        run: |
          ssh -i ~/.ssh/pi_key -o StrictHostKeyChecking=no \
            ${{ vars.PI_USER }}@${{ vars.PI_HOST }} << 'ENDSSH'
          set -e

          # Determine installation directory
          INSTALL_DIR="${{ vars.INSTALL_DIR }}"
          if [ -z "$INSTALL_DIR" ]; then
            INSTALL_DIR="$HOME/proto-fleet"
          fi

          echo "Installing ProtoFleet to: $INSTALL_DIR"

          # Create installation directory
          mkdir -p "$INSTALL_DIR"

          # Check if there's an existing .env file to preserve
          ENV_FILE="$INSTALL_DIR/deployment/server/influx_config/.env"
          if [ -f "$ENV_FILE" ]; then
            echo "Backing up existing .env file..."
            cp "$ENV_FILE" /tmp/.env.backup
          fi

          # Extract deployment bundle
          echo "Extracting deployment bundle..."
          tar -xzf /tmp/proto-fleet-deployment.tar.gz -C "$INSTALL_DIR"

          # Restore .env file if it existed
          if [ -f "/tmp/.env.backup" ]; then
            echo "Restoring .env file..."
            cp /tmp/.env.backup "$ENV_FILE"
            rm /tmp/.env.backup
          fi

          # Clean up tarball
          rm /tmp/proto-fleet-deployment.tar.gz

          # Navigate to deployment directory
          cd "$INSTALL_DIR/deployment"

          # Make run-fleet.sh executable
          chmod +x run-fleet.sh

          # Run the deployment script
          echo "Running deployment script..."
          ./run-fleet.sh

          echo "Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/pi_key -o StrictHostKeyChecking=no \
            ${{ vars.PI_USER }}@${{ vars.PI_HOST }} << 'ENDSSH'

          INSTALL_DIR="${{ vars.INSTALL_DIR }}"
          if [ -z "$INSTALL_DIR" ]; then
            INSTALL_DIR="$HOME/proto-fleet"
          fi

          cd "$INSTALL_DIR/deployment"

          echo "Checking Docker containers..."
          docker compose ps

          echo ""
          echo "Deployment version:"
          cat version.txt
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: |
          rm -f ~/.ssh/pi_key
