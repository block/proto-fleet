name: ProtoFleet Deploy to Raspberry Pi

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: string
      environment:
        description: 'Raspberry Pi runner to deploy to (self-hosted runners with proto-fleet-rpi tag)'
        required: true
        type: choice
        options:
          - pi-stl
          - pi-mar
          - pi-fxsj
          - pi-dalton

permissions:
  contents: read

jobs:
  build-proto-fleet-server:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Build Golang server (arm64)
        working-directory: ./server
        run: |
          go mod download
          go build -v -o fleetd ./cmd/fleetd
          echo "version: dev-${{ github.sha }}" > version.txt
          echo "branch: ${{ inputs.branch }}" >> version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> version.txt
          echo "commit: ${{ github.sha }}" >> version.txt

      - name: Build Go plugin binaries (arm64)
        run: |
          echo "Syncing Go workspace..."
          go work sync
          echo "Building Go plugins for arm64..."
          go build -o server/proto-plugin ./plugin/proto
          go build -o server/antminer-plugin ./plugin/antminer
          chmod +x server/proto-plugin server/antminer-plugin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build asicrs plugin binary (arm64)
        run: |
          docker buildx build \
            --file plugin/asicrs/Dockerfile.build \
            --output "type=local,dest=/tmp/asicrs" \
            .
          cp "/tmp/asicrs/asicrs-plugin" "server/asicrs-plugin"
          cp "/tmp/asicrs/asicrs-config.yaml" "server/asicrs-config.yaml"
          chmod +x server/asicrs-plugin
          echo "asicrs plugin built successfully for arm64"

      - name: Package server binaries (arm64)
        working-directory: ./server
        run: |
          tar -czf proto-fleet-server-dev.tar.gz \
            fleetd \
            proto-plugin \
            antminer-plugin \
            asicrs-plugin \
            asicrs-config.yaml \
            version.txt

      - name: Upload server artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: proto-fleet-server-artifact
          path: ./server/proto-fleet-server-dev.tar.gz
          retention-days: 1

  build-proto-fleet-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build ProtoFleet client
        working-directory: ./client
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export VITE_VERSION="dev-${{ github.sha }}"
          export VITE_BUILD_DATE="$BUILD_DATE"
          export VITE_COMMIT="${{ github.sha }}"
          npm run build:protoFleet

      - name: Create version file
        working-directory: ./client
        run: |
          echo "version: dev-${{ github.sha }}" > dist/protoFleet/version.txt
          echo "branch: ${{ inputs.branch }}" >> dist/protoFleet/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> dist/protoFleet/version.txt
          echo "commit: ${{ github.sha }}" >> dist/protoFleet/version.txt

      - name: Package ProtoFleet client
        working-directory: ./client
        run: |
          tar -czf proto-fleet-client-dev.tar.gz dist/protoFleet

      - name: Upload client artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: proto-fleet-client-artifact
          path: ./client/proto-fleet-client-dev.tar.gz
          retention-days: 1

  build-deployment-bundle:
    runs-on: ubuntu-latest
    needs: [build-proto-fleet-server, build-proto-fleet-client]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Create deployment directory structure
        run: |
          mkdir -p deployment/server
          mkdir -p deployment/client

      - name: Download server artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: proto-fleet-server-artifact
          path: /tmp

      - name: Download client artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: proto-fleet-client-artifact
          path: /tmp

      - name: Extract artifacts
        run: |
          tar -xzf /tmp/proto-fleet-server-dev.tar.gz -C deployment/server
          mkdir -p /tmp/client
          tar -xzf /tmp/proto-fleet-client-dev.tar.gz -C /tmp/client
          mkdir -p deployment/client/protoFleet
          cp -r /tmp/client/dist/protoFleet/* deployment/client/protoFleet/

      - name: Copy deployment configuration files
        run: |
          cp deployment-files/client/Dockerfile deployment/client/
          cp deployment-files/client/nginx.http.conf deployment/client/
          cp deployment-files/client/nginx.https.conf deployment/client/
          cp deployment-files/server/Dockerfile deployment/server/
          cp deployment-files/docker-compose.yaml deployment/
          cp server/docker-compose.base.yaml deployment/server/
          cp deployment-files/run-fleet.sh deployment/
          chmod +x deployment/run-fleet.sh

      - name: Create version file
        run: |
          echo "version: dev-${{ github.sha }}" > deployment/version.txt
          echo "branch: ${{ inputs.branch }}" >> deployment/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment/version.txt
          echo "commit: ${{ github.sha }}" >> deployment/version.txt

      - name: Package deployment bundle
        run: |
          tar -czf proto-fleet-deployment.tar.gz deployment

      - name: Upload deployment bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: proto-fleet-deployment-bundle
          path: proto-fleet-deployment.tar.gz
          retention-days: 1

  deploy-to-pi:
    runs-on: [self-hosted, proto-fleet-rpi, '${{ inputs.environment }}']
    needs: [build-deployment-bundle]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Deploy ProtoFleet to ${{ inputs.environment }}
        uses: ./.github/actions/deploy-protofleet
        with:
          artifact_name: proto-fleet-deployment-bundle
          install_dir: ${{ vars.INSTALL_DIR }}
