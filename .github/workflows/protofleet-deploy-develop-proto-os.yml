# This VM with Docker Compose deployment is meant to be used only for development and testing of the ProtoFleet on-premise version.

name: ProtoFleet Deploy Develop Proto OS

on:
  # NOTE: This workflow requires access to miner-firmware (private) to build the simulator
  # It can only be triggered manually with appropriate access
  workflow_dispatch:

permissions:
  # Needed for aws-actions/configure-aws-credentials
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: "${{ github.workflow }}-proto-os"
      cancel-in-progress: true
    steps:
      - name: Create GitHub App token
        id: create_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: "${{ steps.create_token.outputs.token }}"
          submodules: recursive

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4
        
      - name: Build base simulator Docker image
        shell: bash
        run: |
          cd client
          npm clean-install
          npm run build:protoOS
          cd ..
          mkdir -p miner-firmware/docker/sim/protoOS/dist/protoOS
          cp -r client/dist/protoOS/* miner-firmware/docker/sim/protoOS/dist/protoOS
          docker build --build-arg "TYPE=b4-sim" -f "miner-firmware/docker/sim/Dockerfile" -t "protofleet/miner-sim-develop-base:latest" miner-firmware

      - name: Deploy Docker to Develop VM
        uses: ./.github/actions/deploy-docker-to-develop-vm
        with:
          docker-build-working-directory: "."
          docker-image-tag: "protofleet/frontend-proto-os-develop:main"
          source-build-directory: "deploy/develop/frontend/proto-os"
          target-directory: "docker/protofleet/develop/frontend/proto-os"
