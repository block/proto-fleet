name: Pull Request

on: pull_request_target # zizmor: ignore[dangerous-triggers] labeler needs fork-PR write access; workflow never checks out PR head

permissions:
  contents: read
  repository-projects: read
  pull-requests: write

jobs:
  triage:
    name: Triage
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true

  auto-assign:
    name: Auto-Assign
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    # Best-effort labelling step — author already knows the PR is theirs,
    # so transient API hiccups shouldn't gate the merge queue.
    continue-on-error: true

    steps:
      - name: Assign PR to Creator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh pr edit goes through GraphQL (nodeId lookup + mutation)
          # which has been flaky with the workflow's default token. The
          # REST assignees endpoint is a single PATCH that the same
          # GITHUB_TOKEN reliably authenticates.
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/assignees" \
            -f "assignees[]=${{ github.actor }}"
