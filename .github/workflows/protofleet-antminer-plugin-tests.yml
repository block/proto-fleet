name: ProtoFleet antminer plugin tests

on:
  pull_request:
    paths:
      # - ".github/workflows/protofleet-antminer-plugin-tests.yml"
      - "plugin/antminer/**"
  push:
    branches:
      - main
    paths:
      # - ".github/workflows/protofleet-antminer-plugin-tests.yml"
      - "plugin/antminer/**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Lint protocol buffers
        run: |
          just lint

      - name: Lint protocol golang
        run: |
          cd plugin/antminer
          just lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin/antminer
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Configure cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-workspace-${{ hashFiles('**/go.sum', 'go.work') }}
          restore-keys: |
            ${{ runner.os }}-go-workspace-
            ${{ runner.os }}-go-

      - name: Compile project
        run: just build

      - name: Run tests
        run: just test
