name: ProtoOS E2E Tests

on:
  pull_request:
    paths:
      - ".github/workflows/protoos-e2e-tests.yml"
      - "client/e2eTests/protoOS/**"
  schedule:
    # Run daily at 7 AM UTC on main branch
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        project: [desktop, mobile]

    steps:
      - name: Create GitHub App token
        id: create_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: "${{ steps.create_token.outputs.token }}"

      - name: Activate hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Cache Docker layers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-protoos-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-protoos-
            ${{ runner.os }}-buildx-

      - name: Checkout miner-firmware for Proto OS simulator
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: btc-mining/miner-firmware
          path: miner-firmware
          token: "${{ steps.create_token.outputs.token }}"
          submodules: "recursive"

      - name: Build miner-firmware simulator with Proto OS
        env:
          GH_TOKEN: ${{ steps.create_token.outputs.token }}
        run: |
          cd miner-firmware/docker/sim

          # Download latest Proto OS UI
          echo "Fetching latest Proto OS..."
          just fetch-proto-os

          # Build the simulator image with Proto OS
          echo "Building miner-firmware-sim with Proto OS web UI..."
          docker build \
            --build-arg TYPE=b3b-sim \
            --build-arg PORT=8080 \
            -t miner-firmware-sim \
            -f Dockerfile \
            ../..

      - name: Start miner-firmware simulator with Proto OS
        run: |
          # Start the simulator
          echo "Starting miner-firmware simulator..."
          docker run -d \
            --name miner-firmware-sim \
            --privileged \
            -p 8080:8080 \
            -p 2121:2121 \
            miner-firmware-sim

          # Wait for Proto OS web UI to be ready
          echo "Waiting for Proto OS to be ready..."
          for i in {1..60}; do
            if curl -f http://localhost:8080/api/v1 2>/dev/null; then
              echo "Proto OS is ready at http://localhost:8080"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Proto OS failed to start"
              docker logs miner-firmware-sim
              exit 1
            fi
            echo "Attempt $i/60: Waiting for Proto OS..."
            sleep 2
          done

      - name: Cache Node modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            client/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client/e2eTests/protoOS
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (${{ matrix.project }})
        working-directory: client/e2eTests/protoOS
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-protoos-${{ matrix.project }}
          path: client/e2eTests/protoOS/playwright-report/
          retention-days: 30

      - name: Install Testmo CLI
        if: ${{ !cancelled() && github.event_name == 'schedule' }}
        run: |
          npm install -g @testmo/testmo-cli@1.0.0

      - name: Submit test results to Testmo
        if: ${{ !cancelled() && github.event_name == 'schedule' }}
        working-directory: client/e2eTests
        env:
          TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
        run: |
          # Add XML declaration if missing (Playwright sometimes omits it on CI)
          if ! head -n 1 test-results/results.xml | grep -q '<?xml'; then
            echo "XML declaration missing, adding it..."
            echo '<?xml version="1.0" encoding="UTF-8"?>' | cat - test-results/results.xml > test-results/results-fixed.xml
            mv test-results/results-fixed.xml test-results/results.xml
            echo "First 2 lines after fix:"
            head -n 2 test-results/results.xml
          else
            echo "XML declaration already present"
          fi

          testmo automation:run:submit \
            --instance https://proto.testmo.net \
            --project-id 2 \
            --name "Proto OS E2E Tests - ${{ matrix.project }} - $(date +'%Y-%m-%d %H:%M')" \
            --source "protoos-e2e-tests-${{ matrix.project }}" \
            --results test-results/*.xml

      - name: Determine report directory
        if: ${{ !cancelled() }}
        id: report-dir
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REPORT_DIR="protoos-e2e-reports/pr-${{ github.event.pull_request.number }}/${{ matrix.project }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            REPORT_DIR="protoos-e2e-reports/main/${{ matrix.project }}"
          else
            # workflow_dispatch - use sanitized branch name
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9_-]/-/g')
            REPORT_DIR="protoos-e2e-reports/branch-${BRANCH_NAME}/${{ matrix.project }}"
          fi
          echo "dir=${REPORT_DIR}" >> $GITHUB_OUTPUT
          echo "Report will be published to: ${REPORT_DIR}"

      - name: Add job summary with test results
        if: ${{ !cancelled() }}
        run: |
          REPORT_URL="https://btc-mining.github.io/proto-fleet/${{ steps.report-dir.outputs.dir }}"
          echo "## 🎭 Proto OS E2E Test Results (${{ matrix.project }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **[View Latest Published HTML Report](${REPORT_URL})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Test artifacts:** Available in the artifacts section below" >> $GITHUB_STEP_SUMMARY

      - name: Publish Playwright report to GitHub Pages
        if: ${{ !cancelled() }}
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/e2eTests/protoOS/playwright-report
          destination_dir: ${{ steps.report-dir.outputs.dir }}
          keep_files: false

      - name: Comment PR with report link
        if: ${{ !cancelled() && github.event_name == 'pull_request' && matrix.project == 'desktop' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const desktopReportUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/protoos-e2e-reports/pr-${prNumber}/desktop`;
            const mobileReportUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/protoos-e2e-reports/pr-${prNumber}/mobile`;
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## 🎭 Proto OS E2E Test Report

            📊 **[Desktop Report](${desktopReportUrl})** | **[Mobile Report](${mobileReportUrl})**
            📦 **[Download Artifacts](${artifactUrl})**

            *Report for workflow run #${context.runNumber}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload test screenshots
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: failure()
        with:
          name: playwright-screenshots-protoos-${{ matrix.project }}
          path: client/e2eTests/protoOS/test-results/
          retention-days: 7

      - name: Dump miner logs on failure
        if: failure()
        run: |
          echo "=== Miner Firmware Sim Logs ==="
          docker logs miner-firmware-sim 2>&1 || echo "No miner-firmware-sim logs available"

      - name: Cleanup
        if: always()
        run: |
          # Stop and remove miner-firmware-sim container
          docker stop miner-firmware-sim 2>/dev/null || true
          docker rm miner-firmware-sim 2>/dev/null || true
