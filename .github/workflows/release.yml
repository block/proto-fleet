name: Create ProtoFleet Release Artifacts

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: read

jobs:
  build-proto-fleet-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Build Golang server
        working-directory: ./server
        run: |
          go mod download
          GOOS=linux GOARCH=amd64 go build -v -o fleetd-amd64 ./cmd/fleetd
          GOOS=linux GOARCH=arm64 go build -v -o fleetd-arm64 ./cmd/fleetd
          echo "version: ${{ github.event.release.tag_name }}" > version.txt
          echo "is_prerelease: ${{ github.event.release.prerelease }}" >> version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> version.txt
          echo "commit: ${{ github.sha }}" >> version.txt

      - name: Build plugin binaries
        run: |
          echo "Syncing Go workspace..."
          go work sync
          echo "Building plugins for multiple architectures..."
          GOOS=linux GOARCH=amd64 go build -o server/proto-plugin-amd64 ./plugin/proto
          GOOS=linux GOARCH=amd64 go build -o server/antminer-plugin-amd64 ./plugin/antminer
          GOOS=linux GOARCH=arm64 go build -o server/proto-plugin-arm64 ./plugin/proto
          GOOS=linux GOARCH=arm64 go build -o server/antminer-plugin-arm64 ./plugin/antminer
          chmod +x server/proto-plugin-* server/antminer-plugin-*
          echo "Multi-arch plugins built successfully"

      - name: Package server binaries
        working-directory: ./server
        run: |
          tar -czf proto-fleet-server-${{ github.event.release.tag_name }}.tar.gz \
            fleetd-amd64 fleetd-arm64 \
            proto-plugin-amd64 proto-plugin-arm64 \
            antminer-plugin-amd64 antminer-plugin-arm64 \
            version.txt

      # Upload to GitHub Actions artifacts
      - name: Upload server artifact for job use
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: proto-fleet-server-artifact
          path: ./server/proto-fleet-server-${{ github.event.release.tag_name }}.tar.gz
          retention-days: 1

      - name: Upload ProtoFleet server artifact
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: ./server/proto-fleet-server-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-proto-fleet-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build ProtoFleet client
        working-directory: ./client
        run: |
          # Set separate version environment variables
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export VITE_VERSION="${{ github.event.release.tag_name }}"
          export VITE_BUILD_DATE="$BUILD_DATE"
          export VITE_COMMIT="${{ github.sha }}"
          npm run build:protoFleet

      - name: Create version file
        working-directory: ./client
        run: |
          echo "version: ${{ github.event.release.tag_name }}" > dist/protoFleet/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> dist/protoFleet/version.txt
          echo "commit: ${{ github.sha }}" >> dist/protoFleet/version.txt

      - name: Package ProtoFleet client
        working-directory: ./client
        run: |
          tar -czf proto-fleet-client-${{ github.event.release.tag_name }}.tar.gz dist/protoFleet

      # Upload to GitHub Actions artifacts
      - name: Upload client artifact for job use
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: proto-fleet-client-artifact
          path: ./client/proto-fleet-client-${{ github.event.release.tag_name }}.tar.gz
          retention-days: 1

      - name: Upload ProtoFleet client artifact
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: ./client/proto-fleet-client-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-proto-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build ProtoOS
        working-directory: ./client
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export VITE_VERSION="${{ github.event.release.tag_name }}"
          export VITE_BUILD_DATE="$BUILD_DATE"
          export VITE_COMMIT="${{ github.sha }}"
          npm run build:protoOS

      - name: Create version file
        working-directory: ./client
        run: |
          echo "version: ${{ github.event.release.tag_name }}" > dist/protoOS/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> dist/protoOS/version.txt
          echo "commit: ${{ github.sha }}" >> dist/protoOS/version.txt

      - name: Package ProtoOS
        working-directory: ./client
        run: |
          tar -czf proto-os-${{ github.event.release.tag_name }}.tar.gz dist/protoOS

      - name: Upload ProtoOS artifact
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: ./client/proto-os-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: "us-east-1"
          role-to-assume: "arn:aws:iam::941377115117:role/GithubActions_ProtoFleet_Release"

      - name: Upload ProtoOS bundle to S3
        run: |
          aws s3 cp \
            ./client/proto-os-${{ github.event.release.tag_name }}.tar.gz \
            s3://proto-fleet/releases/fleet/${{ github.event.release.tag_name }}/ \
            --acl public-read

  build-proto-fleet:
    runs-on: ubuntu-latest
    needs: [build-proto-fleet-server, build-proto-fleet-client]
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Create deployment directory structure
        run: |
          mkdir -p deployment/server
          mkdir -p deployment/client

      - name: Download server artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: proto-fleet-server-artifact
          path: /tmp

      - name: Download client artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: proto-fleet-client-artifact
          path: /tmp

      - name: Extract artifacts
        run: |
          tar -xzf /tmp/proto-fleet-server-${{ github.event.release.tag_name }}.tar.gz -C deployment/server
          mkdir -p /tmp/client
          tar -xzf /tmp/proto-fleet-client-${{ github.event.release.tag_name }}.tar.gz -C /tmp/client
          mkdir -p deployment/client/protoFleet
          cp -r /tmp/client/dist/protoFleet/* deployment/client/protoFleet/

      - name: Copy deployment configuration files
        run: |
          cp deployment-files/client/Dockerfile deployment/client/
          cp deployment-files/client/nginx.http.conf deployment/client/
          cp deployment-files/client/nginx.https.conf deployment/client/
          cp deployment-files/server/Dockerfile deployment/server/
          cp deployment-files/docker-compose.yaml deployment/
          cp server/docker-compose.base.yaml deployment/server/
          cp deployment-files/run-fleet.sh deployment/
          cp deployment-files/migrate-data.sh deployment/
          cp deployment-files/rollback-migration.sh deployment/
          cp -r deployment-files/scripts deployment/
          chmod +x deployment/run-fleet.sh deployment/migrate-data.sh deployment/rollback-migration.sh deployment/scripts/*.sh

      - name: Create version file
        run: |
          echo "version: ${{ github.event.release.tag_name }}" > deployment/version.txt
          echo "build_date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment/version.txt
          echo "commit: ${{ github.sha }}" >> deployment/version.txt

      - name: Package full ProtoFleet deployment bundle
        run: |
          tar -czf proto-fleet-${{ github.event.release.tag_name }}.tar.gz deployment

      # Upload to GitHub Actions artifacts for deployment job
      - name: Upload deployment bundle artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: proto-fleet-deployment-bundle
          path: proto-fleet-${{ github.event.release.tag_name }}.tar.gz
          retention-days: 1

      - name: Upload full ProtoFleet deployment bundle
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: proto-fleet-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: "us-east-1"
          role-to-assume: "arn:aws:iam::941377115117:role/GithubActions_ProtoFleet_Release"
      - name: Upload ProtoFleet bundle to S3
        run: |
          aws s3 cp \
            proto-fleet-${{ github.event.release.tag_name }}.tar.gz \
              s3://proto-fleet/releases/fleet/${{ github.event.release.tag_name }}/ \
              --acl public-read
      - name: Upload install script to S3
        run: |
          aws s3 cp \
            deployment-files/install.sh \
            s3://proto-fleet/releases/fleet/${{ github.event.release.tag_name }}/install.sh \
            --acl public-read

      - name: Sync release to latest folder
        if: github.event.release.prerelease == false
        run: |
          echo "Syncing to latest folder"
          aws s3 sync \
            s3://proto-fleet/releases/fleet/${{ github.event.release.tag_name }}/ \
            s3://proto-fleet/releases/fleet/latest/ \
            --acl public-read \
            --delete

      - name: Skip sync for pre-release
        if: github.event.release.prerelease == true
        run: echo "Skipping sync to latest folder - this is a pre-release"

      - name: Upload version file to latest folder
        if: github.event.release.prerelease == false
        run: |
          echo "Uploading version file to latest folder"
          aws s3 cp \
            deployment/version.txt \
            s3://proto-fleet/releases/fleet/latest/version.txt \
            --acl public-read

  deploy-to-testing-env:
    runs-on: [self-hosted, proto-fleet-rpi, 'pi-mar']
    needs: [build-proto-fleet]
    if: github.event.release.prerelease == false
    timeout-minutes: 30
    environment: testing-env
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Deploy ProtoFleet to pi-mar (testing environment)
        uses: ./.github/actions/deploy-protofleet
        with:
          artifact_name: proto-fleet-deployment-bundle
          install_dir: ${{ vars.INSTALL_DIR }}

  deploy-to-all-envs:
    runs-on: [self-hosted, proto-fleet-rpi, '${{ matrix.environment }}']
    needs: [deploy-to-testing-env]
    if: github.event.release.prerelease == false
    timeout-minutes: 30
    strategy:
      matrix:
        environment: [pi-stl, pi-fxsj, pi-dalton]
      fail-fast: false
    environment: all-envs
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Deploy ProtoFleet to ${{ matrix.environment }}
        uses: ./.github/actions/deploy-protofleet
        with:
          artifact_name: proto-fleet-deployment-bundle
          install_dir: ${{ vars.INSTALL_DIR }}
