name: Configure Go Cache
description: Setup Go build and module caching for workspace

runs:
  using: "composite"
  steps:
    - name: Configure Go cache
      uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-workspace-${{ hashFiles('**/go.sum', 'go.work') }}
        restore-keys: |
          ${{ runner.os }}-go-workspace-
          ${{ runner.os }}-go-
