name: protofleet-develop-traefik

services:
  traefik:
    container_name: "protofleet-develop-traefik"
    image: traefik:v3.3.4
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2121:2121"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./volumes/traefik/etc:/etc/traefik:rw"
    environment:
      AWS_REGION: "us-east-1"
      AWS_HOSTED_ZONE_ID: "Z10142743JZQ1CV0LRSER"
    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.network=protofleet-develop-traefik_traefik"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certResolver=cert-resolver"

      - "--entrypoints.miner-grpc.address=:2121"
      - "--entrypoints.miner-grpc.http.tls.certResolver=cert-resolver"

      # TODO Add a correct email
      - "--certificatesresolvers.cert-resolver.acme.email=info@fleetdev.proto.xyz"
      - "--certificatesresolvers.cert-resolver.acme.storage=/etc/traefik/acme.json"
      - "--certificatesresolvers.cert-resolver.acme.dnschallenge.provider=route53"
    labels:
      - "traefik.http.routers.protofleet-develop-traefik_dashboard.rule=Host(`traefik.${VM_SUBDOMAIN}.fleetdev.proto.xyz`)"
      - "traefik.http.routers.protofleet-develop-traefik_dashboard.entrypoints=websecure"
      - "traefik.http.routers.protofleet-develop-traefik_dashboard.service=api@internal"
    networks:
      - traefik
    logging:
      driver: "json-file"
      options:
        max-size: 100m

networks:
  traefik:
