name: protofleet-develop-${LABEL}-backend

services:
  backend:
    container_name: "protofleet-develop-${LABEL}-backend"
    image: ${IMAGE}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
        restart: true
      influxdb:
        condition: service_healthy
        restart: true
    environment:
      DB_NAME: "fleet"
      DB_USERNAME: "root"
      DB_PASSWORD: "swinging.marsh.front.grief"
      DB_ADDRESS: "protofleet-develop-${LABEL}-backend-mysql:3306"
      HTTP_LISTEN_ADDRESS: ":80"
      AUTH_CLIENT_SECRET_KEY: "00000000000000000000000000000000000000000000"
      AUTH_CLIENT_EXPIRATION_PERIOD: "1000000h"
      AUTH_MINER_EXPIRATION_PERIOD: "1000000h"
      LOG_LEVEL: "DEBUG"
      PAIRING_SECRET_KEY: "00000000000000000000000000000000000000000000"
      ENCRYPT_SERVICE_MASTER_KEY: "EV0g7BoFQnqshvzep9knZsUUmvsqSBsjDAJus7ri0B8="
      INFLUXDB3_URL: "http://protofleet-develop-${LABEL}-backend-influxdb:8181"
      INFLUXDB3_ORG: "fleet"
      INFLUXDB3_BUCKET: "fleet"
    expose:
      - "80"
    labels:
      - "traefik.http.services.protofleet-develop-${LABEL}-backend.loadbalancer.server.port=80"

      - "traefik.http.routers.protofleet-develop-${LABEL}-backend.rule=Host(`backend.${LABEL}.develop.fleetdev.proto.xyz`)"
      - "traefik.http.routers.protofleet-develop-${LABEL}-backend.entrypoints=websecure"
      - "traefik.http.routers.protofleet-develop-${LABEL}-backend.service=protofleet-develop-${LABEL}-backend"
    networks:
      - traefik
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: 100m
    volumes:
      - "./volumes/influxdb/influx_config:/var/lib/fleet/start:ro"

  mysql:
    container_name: "protofleet-develop-${LABEL}-backend-mysql"
    image: mysql:8.4.4
    restart: unless-stopped
    environment:
      MYSQL_LOG_CONSOLE: "1"
      MYSQL_INITDB_SKIP_TZINFO: "1" # Including TZ info slows down initialisation quite a bit
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: "swinging.marsh.front.grief"
      MYSQL_DATABASE: "fleet"
    expose:
      - "3306"
    labels:
      - "traefik.enabled=false"
    volumes:
      - "./volumes/mysql:/var/lib/mysql"
    command: --sql-mode= --log-bin --binlog-format=ROW --server-id=1 --skip-name-resolve --explicit-defaults-for-timestamp=ON
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p$MYSQL_ROOT_PASSWORD",
        ]
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: 100m

  influxdb:
    container_name: "protofleet-develop-${LABEL}-backend-influxdb"
    image: influxdb:3.2-core
    restart: unless-stopped
    user: root
    entrypoint: |
      /bin/sh -c '
      # Start InfluxDB server in background
      influxdb3 serve &
      
      # Wait for InfluxDB to be healthy
      echo "Waiting for InfluxDB to be healthy..."
      until curl -s http://localhost:8181/health | grep -q "OK" ; do
        sleep 5
      done
      echo "InfluxDB is healthy."
      
      # Check if token is already set in /var/lib/influxdb3/start/.env
      ENV_FILE=/var/lib/influxdb3/start/.env
      
      touch "$$ENV_FILE"
      
      # Generate a new token (capture both stdout and stderr)
      influxdb3 create token --admin > /tmp/influxdb3_token.txt 2>&1
      if [ $$? -ne 0 ]; then
          echo "Failed to create InfluxDB token."
          exit 1
      fi

      if grep -q "409" /tmp/influxdb3_token.txt; then
          echo "Token already exists, reusing the existing token."
      else
          echo "New token created successfully."
      
          # Read the token from the file
          # Extracting token from line "Token: <token_value>"
          TOKEN=$(cat /tmp/influxdb3_token.txt | grep Token | cut -d" " -f2)

          # Check if the token is empty
          if [ -z "$$TOKEN" ]; then
              echo "Failed to extract token from /tmp/influxdb3_token.txt."
              exit 1
          fi 
      
          # Write the token to the .env file
          if grep -q "^INFLUXDB3_AUTH_TOKEN=" "$$ENV_FILE"; then
              # replace existing token
              sed -i "s/^INFLUXDB3_AUTH_TOKEN=.*/INFLUXDB3_AUTH_TOKEN=$$TOKEN/" "$$ENV_FILE"
          else
              # append new token
              echo "INFLUXDB3_AUTH_TOKEN=$$TOKEN" >> "$$ENV_FILE"
          fi
          echo "Token written to $$ENV_FILE."
      fi
      
      # Wait for the background InfluxDB process
      wait 
      '
    environment:
      INFLUXDB_HTTP_PORT: 8181
      INFLUXDB_ORG: "fleet"
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: "influxdb1"
      INFLUXDB3_DISABLE_AUTHZ: "health"
      INFLUXDB3_OBJECT_STORE: "file"
      INFLUXDB3_DB_DIR: "/var/lib/influxdb3"
      INFLUXDB3_BUCKET: "fleet"
    expose:
      - "8181"
    labels:
      - "traefik.enabled=false"
    volumes:
      - "./volumes/influxdb/data:/var/lib/influxdb3"
      - "./volumes/influxdb/config:/etc/influxdb3"
      - "./volumes/influxdb/influx_config:/var/lib/influxdb3/start"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: 100m

networks:
  backend:
  traefik:
    name: protofleet-develop-traefik_traefik
    external: true
