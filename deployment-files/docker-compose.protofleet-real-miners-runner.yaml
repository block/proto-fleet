# Unified Docker Compose stack for running ProtoFleet E2E against real miners.
#
# - Linux-only (uses host networking for LAN miner discovery)
# - Includes DB + Fleet API + ProtoFleet frontend (nginx)
# - All paths are relative to deployment-files/
#
# Usage (from repo root):
#   docker compose -f deployment-files/docker-compose.protofleet-real-miners-runner.yaml up -d

services:
  timescaledb:
    build:
      context: ../server/timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: "fleet"
      POSTGRES_USER: "fleet"
      POSTGRES_PASSWORD: "fleet"
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "timescaledb.max_background_workers=4"
      - "-c"
      - "work_mem=32MB"
    healthcheck:
      test: ["CMD-SHELL", "psql -U fleet -d fleet -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 45
      start_period: 30s
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 256M
    network_mode: host

  fleet-api:
    extends:
      file: ../server/docker-compose.base.yaml
      service: fleet-api
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      AUTH_CLIENT_SECRET_KEY: "${AUTH_CLIENT_SECRET_KEY:-00000000000000000000000000000000000000000000}"
      AUTH_CLIENT_EXPIRATION_PERIOD: "168h"
      AUTH_MINER_EXPIRATION_PERIOD: "168h"
      DB_NAME: "fleet"
      DB_USERNAME: "fleet"
      DB_PASSWORD: "fleet"
      DB_SSL_MODE: "disable"
      HTTP_LISTEN_ADDRESS: "0.0.0.0:4000"
      LOG_LEVEL: "INFO"
      ENCRYPT_SERVICE_MASTER_KEY: "EV0g7BoFQnqshvzep9knZsUUmvsqSBsjDAJus7ri0B8="
      PLUGINS_DIR: "/app/plugins"
      PLUGINS_ENABLED: "true"
      # With host networking, service DNS names like "timescaledb" aren't available.
      DB_ADDRESS: "127.0.0.1:5432"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/health"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    volumes:
      - ../server/plugins:/app/plugins:ro
    restart: unless-stopped
    network_mode: host

  protofleet-frontend:
    image: nginx:1.29.0-alpine
    restart: unless-stopped
    depends_on:
      fleet-api:
        condition: service_healthy
    volumes:
      - ../client/dist/protoFleet:/usr/share/nginx/html:ro
      - ../client/nginx.runner-protofleet.conf:/etc/nginx/conf.d/default.conf:ro
    network_mode: host

volumes:
  timescaledb-data:
