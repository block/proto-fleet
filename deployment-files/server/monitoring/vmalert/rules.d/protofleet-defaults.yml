# protofleet-defaults: bootstrap rules shipped on first run.

groups:
  - name: protofleet-defaults
    interval: 30s
    rules:
      - alert: DeviceOffline
        # Fires when EITHER the gauge has been explicitly zero for five
        # minutes OR the series has vanished entirely for ten minutes.
        # The two windows differ on purpose: 5m for the explicit-zero
        # case (we know the device is down), 10m for the missing-series
        # case (we are inferring an outage from the absence of data).
        expr: |
          (max_over_time(fleet_device_online[5m]) == 0)
          or
          (absent_over_time(fleet_device_online[10m]) == 1)
        for: 5m
        labels:
          severity: warning
          rule_group: protofleet-defaults
          template: offline
        annotations:
          summary: "Device {{ $labels.device_id }} is offline"
          description: |
            Device {{ $labels.device_id }} has been unreachable for at
            least five minutes. This rule fires both when the telemetry
            pipeline writes fleet_device_online=0 explicitly and when
            the series vanishes entirely (device removed or pipeline
            stopped emitting).

      - alert: DeviceTemperatureHigh
        # Default temperature ceiling: per-device max temperature above
        # 90 °C for ten minutes. Operators tune this per-org via the
        # Temperature template once Issue 16 lands.
        expr: max by (organization_id, device_id) (fleet_device_temperature_max_celsius) > 90
        for: 10m
        labels:
          severity: warning
          rule_group: protofleet-defaults
          template: temperature
        annotations:
          summary: "Device {{ $labels.device_id }} is running hot"
          description: |
            Maximum sensor temperature for device {{ $labels.device_id }}
            has been above 90 °C for at least ten minutes.

      - alert: DevicePoolDisconnected
        # The pool gauge is set to 0 when the device's primary mining
        # pool connection drops. Fires after fifteen minutes of sustained
        # disconnect to absorb pool-side blips.
        expr: max_over_time(fleet_device_pool_connected[15m]) == 0
        for: 15m
        labels:
          severity: warning
          rule_group: protofleet-defaults
          template: pool
        annotations:
          summary: "Device {{ $labels.device_id }} pool disconnected"
          description: |
            Device {{ $labels.device_id }} has not reported pool
            connectivity for fifteen minutes.

      - alert: TelemetryPollFailureRateHigh
        # Sustained telemetry poll failures usually mean a network or
        # auth problem affecting many devices at once. Fires when the
        # failure rate over the last ten minutes exceeds the success
        # rate.
        expr: |
          sum by (organization_id) (rate(fleet_telemetry_poll_total{result="failure"}[10m]))
            >
          sum by (organization_id) (rate(fleet_telemetry_poll_total{result="success"}[10m]))
        for: 10m
        labels:
          severity: warning
          rule_group: protofleet-defaults
          template: telemetry-poll
        annotations:
          summary: "Telemetry polling is failing for organization {{ $labels.organization_id }}"
          description: |
            More telemetry polls are failing than succeeding for the
            last ten minutes. This typically indicates a fleet-wide
            connectivity or credential problem.
