# proto-fleet-curtailment: alerts that depend on per-org curtailment activity
# and on reconciler liveness. The reconciler heartbeat alert below is
# parked behind a placeholder metric — the canonical heartbeat signal is
# a row in `curtailment_reconciler_heartbeat` and Postgres-native SQL.
# See server/docs/curtailment-reconciler-runbook.md for the SQL form.

groups:
  - name: proto-fleet-curtailment
    interval: 30s
    rules:
      - alert: CurtailmentReconcilerStalled
        # Bridge metric `fleet_curtailment_reconciler_last_tick_age_seconds`
        # is expected from a postgres-exporter or sidecar that publishes
        # `EXTRACT(EPOCH FROM (NOW() - last_tick_at))` from
        # `curtailment_reconciler_heartbeat`. Until that exporter lands,
        # operators use the SQL form in the runbook directly; this rule
        # exists so the wiring is one config change away once it does.
        expr: fleet_curtailment_reconciler_last_tick_age_seconds > 300
        for: 1m
        labels:
          severity: critical
          rule_group: proto-fleet-curtailment
          component: curtailment-reconciler
        annotations:
          summary: "Curtailment reconciler has not ticked in 5+ minutes"
          description: |
            No reconciler tick has advanced the heartbeat row for over
            5 minutes. In-flight curtailment events are now drifting.
            Triage at server/docs/curtailment-reconciler-runbook.md.

      - alert: CurtailmentTickFailureRateHigh
        # Sustained tick-failure rate. Each failure increments the
        # `IncTickFailure` counter; a non-zero increase over five minutes
        # is fine on its own but pairing with absent heartbeat advances
        # is the panic-recover-restart-panic loop the runbook describes.
        expr: |
          increase(fleet_curtailment_reconciler_tick_failures_total[5m]) > 3
        for: 2m
        labels:
          severity: warning
          rule_group: proto-fleet-curtailment
          component: curtailment-reconciler
        annotations:
          summary: "Curtailment reconciler tick failures sustained"
          description: |
            More than three reconciler tick failures in the last five
            minutes. Investigate logs around the failing tick UUIDs and
            consider AdminTerminate'ing a wedged event.
            Triage at server/docs/curtailment-reconciler-runbook.md.
