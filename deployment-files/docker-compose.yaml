x-extends:
  file: ./server/docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./server/docker-compose.base.yaml
      service: fleet-api
    build:
      context: ./server
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    environment:
      LOG_LEVEL: "INFO"
      AUTH_CLIENT_SECRET_KEY: "${AUTH_CLIENT_SECRET_KEY}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      ENCRYPT_SERVICE_MASTER_KEY: "${ENCRYPT_SERVICE_MASTER_KEY}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-true}"
      PLUGINS_DIR: "/app/plugins"
      PLUGINS_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: always
    volumes:
      - ./server/influx_config:/var/lib/fleet/start:ro
    network_mode: host
    extra_hosts:
      - "influxdb:127.0.0.1"
      - "mysql:127.0.0.1"
      - "timescaledb:127.0.0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

  fleet-client:
    build:
      context: ./client
    depends_on:
      - fleet-api
    restart: always
    network_mode: host
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

  mysql:
    extends:
      file: ./server/docker-compose.base.yaml
      service: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "mysql",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
          "-e",
          "SELECT 1",
        ]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

  influxdb:
    extends:
      file: ./server/docker-compose.base.yaml
      service: influxdb
    user: root
    restart: always
    volumes:
      - ./server/influx_config:/var/lib/influxdb3/start
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

  timescaledb:
    extends:
      file: ./server/docker-compose.base.yaml
      service: timescaledb
    profiles:
      - disabled # Only start during migration, not normal operation. TODO(DASH-1206) remove custom profile in PR 4 of migration
    environment:
      POSTGRES_DB: "${DB_NAME:-fleet}"
      POSTGRES_USER: "${DB_USERNAME:-fleet}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-fleet} -d ${DB_NAME:-fleet}",
        ]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

volumes:
  mysql:
  influxdb-data:
  influxdb-config:
  timescaledb-data:

networks:
  fleet-network:
    driver: bridge
