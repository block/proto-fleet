x-extends:
  file: ./server/docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./server/docker-compose.base.yaml
      service: fleet-api
    build:
      context: ./server
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    environment:
      AUTH_CLIENT_SECRET_KEY: "${AUTH_CLIENT_SECRET_KEY}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      PAIRING_SECRET_KEY: "${PAIRING_SECRET_KEY}"
      ENCRYPT_SERVICE_MASTER_KEY: "${ENCRYPT_SERVICE_MASTER_KEY}"
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: always
    volumes:
      - ./server/influx_config:/var/lib/fleet/start:ro
    network_mode: host
    extra_hosts:
      - "influxdb:127.0.0.1"
      - "mysql:127.0.0.1"

  fleet-client:
    build:
      context: ./client
    depends_on:
      - fleet-api
    network_mode: host

  mysql:
    extends:
      file: ./server/docker-compose.base.yaml
      service: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    healthcheck:
      test:
        [
          "CMD",
          "mysql",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
          "-e",
          "SELECT 1",
        ]

  influxdb:
    extends:
      file: ./server/docker-compose.base.yaml
      service: influxdb
    user: root
    volumes:
      - ./server/influx_config:/var/lib/influxdb3/start

volumes:
  mysql:
  influxdb-data:
  influxdb-config:

networks:
  fleet-network:
    driver: bridge
