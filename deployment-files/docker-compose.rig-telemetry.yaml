# Rig telemetry overlay (run-fleet.sh --enable-rig-telemetry): the
# rig-otlp-bridge sidecar streams paired rigs' OTLP metrics to an external
# Prometheus configured in rig-telemetry/config.json.
services:
  rig-otlp-bridge:
    build:
      context: ./server
      dockerfile: Dockerfile.rig-otlp-bridge
    environment:
      OTLP_BRIDGE_CONFIG: /etc/rig-otlp-bridge/config.json
    volumes:
      # Directory (not single-file) mount so host edits are visible in the
      # container; the bridge reads the config once at startup, so apply
      # changes with `docker compose restart rig-otlp-bridge`.
      - ./rig-telemetry:/etc/rig-otlp-bridge:ro
    depends_on:
      - fleet-api
    restart: always
    network_mode: host
    read_only: true
    mem_limit: 512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"
