services:
  fleet-api:
    environment:
      FLEET_TELEMETRY_ENABLED: "${FLEET_TELEMETRY_ENABLED:-false}"
      FLEET_METRICS_ENABLED: "${FLEET_METRICS_ENABLED:-true}"
    depends_on:
      vmalert:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    extra_hosts:
      - "vmalert:127.0.0.1"
      - "alertmanager:127.0.0.1"
    volumes:
      - ./server/monitoring/alertmanager:/etc/proto-fleet/monitoring/alertmanager:rw

  vmalert:
    extends:
      file: ./server/docker-compose.base.yaml
      service: vmalert
    # vmalert reaches fleet-api's shim via the docker host gateway —
    # fleet-api runs in host networking mode in this deployment topology.
    extra_hosts:
      - "fleet-api:host-gateway"
    ports:
      - "127.0.0.1:8880:8880"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

  alertmanager:
    extends:
      file: ./server/docker-compose.base.yaml
      service: alertmanager
    volumes:
      - ./server/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:rw
    ports:
      - "127.0.0.1:9093:9093"
    # alertmanager's `__protofleet_internal` receiver POSTs to
    # http://fleet-api:4000/internal/alertmanager-webhook. fleet-api uses
    # host networking, so we route via the docker host gateway.
    extra_hosts:
      - "fleet-api:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

volumes:
  alertmanager-data:

networks:
  monitoring:
    driver: bridge
