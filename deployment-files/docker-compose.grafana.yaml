# Shared Grafana overlay: run-fleet.sh layers this in whenever a feature
# needing Grafana is enabled; feature overlays add their own provisioning.
services:
  grafana:
    extends:
      file: ./server/docker-compose.base.yaml
      service: grafana
    environment:
      GRAFANA_DB_PASSWORD: "${GRAFANA_DB_PASSWORD:?GRAFANA_DB_PASSWORD is required (run-fleet.sh provisions it)}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required (run-fleet.sh provisions it)}"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY:?GRAFANA_SECRET_KEY is required (run-fleet.sh provisions it)}"
    volumes:
      - ./server/monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./server/monitoring/grafana/provisioning/datasources/timescaledb.yaml:/etc/grafana/provisioning/datasources/timescaledb.yaml:ro
    ports:
      # Loopback-only so operators can reach the UI from the host without
      # exposing it on the LAN.
      - "127.0.0.1:3030:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

volumes:
  grafana-data:

networks:
  monitoring:
    driver: bridge
