version: '3'

services:
  regtest-node:
    image: ruimarinho/bitcoin-core
    container_name: regtest-node
    ports:
      - "2333:2333"
    networks:
      - miner-web
    volumes:
      - ${PWD}/../tools/local_testchain/bitcoin-conf:/home/bitcoin/.bitcoin

  ckpool:
    build:
      context: ${PWD}/../tools/local_testchain/ckpool
    image: mc1/ckpool
    container_name: ckpool
    ports:
      - "3333:3333"
    networks:
      - miner-web
    depends_on:
      - regtest-node
    volumes:
      - ${PWD}/../tools/local_testchain/ckpool-conf/ckpool.conf:/opt/ckpool-build/ckpool.conf

  mcdd-cgminer-miner-api-server:
    build:
      context: ${PWD}/../crates/miner-api-server
    image: mcdd-cgminer-miner-api-server
    container_name: mcdd-cgminer-miner-api-server
    command: /bin/sh -c "/usr/start_mcdd_cgminer_miner_api_server.sh"
    depends_on:
      - ckpool
    ports:
      - "8080:8080"
      - "2121:2121"
      - "4028:4028"
    networks:
      - miner-web
    volumes:
      - ${PWD}/../crates:/usr/src/crates
      - ${PWD}/../crates/mcdd/test/cgminer.conf:/usr/src/cgminer/cgminer.conf
      - ${PWD}/../third-party/cgminer:/usr/src/cgminer
      - ${PWD}/../hashboard/lib/protobuf:/usr/src/hashboard/lib/protobuf
      - ${PWD}/dist:/var/www
      - ${PWD}/scripts/start_mcdd_cgminer_miner_api_server.sh:/usr/start_mcdd_cgminer_miner_api_server.sh

networks:
  miner-web:
