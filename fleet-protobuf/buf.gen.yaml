version: v2
plugins:
  - local: protoc-gen-go
    out: ../fleet/generated/grpc
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../fleet/generated/grpc
    opt: paths=source_relative
  - local: protoc-gen-es
    out: ../miner-web/src/protoFleet/api/generated
    include_imports: true
    opt: target=ts
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/btc-mining/miner-firmware/fleet/generated/grpc
