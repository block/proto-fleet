syntax = "proto3";

package authors.v1;

message AddRequest {
  string name = 1;
  string bio = 2;
}

message AddResponse {
  Author author = 1;
}

message ListRequest {}

message ListResponse {
  repeated Author authors = 1;
}

message Author {
  string name = 1;
  string bio = 2;
  string created_at = 3;
}

service AuthorsService {
  rpc Add(AddRequest) returns (AddResponse) {}
  rpc List(ListRequest) returns (ListResponse) {}
}
