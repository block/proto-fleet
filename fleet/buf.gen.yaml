version: v2
plugins:
  - local: protoc-gen-go
    out: generated/grpc
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: generated/grpc
    opt: paths=source_relative
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/btc-mining/miner-firmware/fleet/generated/grpc
