syntax = "proto3";

package fleetmanagement.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "common/v1/measurement.proto";

// Service for managing fleet-wide settings and configurations
service FleetManagementService {
  // Sets the default pool configuration for the fleet
  // This will be used as the base configuration for new miners
  // or when resetting miners to default settings
  // Any existing default pool will be replaced with this configuration
  rpc SetDefaultPool(SetDefaultPoolRequest) returns (SetDefaultPoolResponse);

  // Lists all configured mining pools
  // Returns pools ordered by priority (highest priority first)
  rpc ListPools(ListPoolsRequest) returns (ListPoolsResponse);

  // Creates a new mining pool configuration
  // First pool created will be set as the default pool
  // The new pool will be assigned the lowest priority by default
  rpc CreatePool(CreatePoolRequest) returns (CreatePoolResponse);

  // Updates an existing pool's configuration
  // Can modify connection details and default status
  rpc UpdatePool(UpdatePoolRequest) returns (UpdatePoolResponse);

  // Updates priorities for multiple pools in a single operation
  // All specified priorities are updated atomically
  rpc UpdatePoolPriority(UpdatePoolPriorityRequest) returns (UpdatePoolPriorityResponse);

  // Deletes a pool configuration
  rpc DeletePool(DeletePoolRequest) returns (DeletePoolResponse);

  // Lists all miners that have been paired with the fleet management system
  // Supports pagination for handling large fleets efficiently
  rpc ListPairedMiners(ListPairedMinersRequest) returns (ListPairedMinersResponse);

  // List all miners in the fleet optionally with their telemetry data
  // Returns a paginated list of miners with their operational status and metrics
  rpc ListMinerStateSnapshots(ListMinerStateSnapshotsRequest) returns (ListMinerStateSnapshotsResponse);

  // Stream real-time measurement updates for miners
  rpc StreamMinerUpdates(StreamMinerUpdatesRequest) returns (stream StreamMinerUpdatesResponse);
}

enum FleetManagementServiceErrorCode {
  FLEET_MANAGEMENT_SERVICE_ERROR_CODE_UNSPECIFIED = 0;
  FLEET_MANAGEMENT_SERVICE_ERROR_CODE_INVALID_PAGINATION_CURSOR = 1;
}

// PoolConfig defines the connection details for a mining pool
message PoolConfig {
  // Pool's stratum URL (e.g., "stratum+tcp://pool.example.com:3333")
  // Required field that specifies the endpoint for connecting to the pool
  string url = 1;

  // Username or wallet address for pool authentication
  // Required field that identifies the user/wallet receiving mining rewards
  string username = 2;

  // Password for pool authentication
  // May be optional depending on pool requirements, often used for worker identification
  google.protobuf.StringValue password = 3;

  // Pool name to identify this pool
  // Human-readable identifier for the pool within the fleet management system
  string pool_name = 4;
}

// Request to set an existing pool as the default for the fleet
// This pool will be used for new miners or when resetting to defaults
message SetDefaultPoolRequest {
  // ID of the existing pool to set as default
  // Must reference a valid pool_id from a previously created pool
  int64 pool_id = 1;
}

// Response to setting default pool configuration
// Empty message as success/failure is indicated by gRPC status
message SetDefaultPoolResponse {
  // The updated default pool with all current values
  Pool pool = 1;
}

enum PoolConnectionStatus {
  POOL_CONNECTION_STATUS_UNSPECIFIED = 0;
  POOL_CONNECTION_STATUS_IDLE = 1;
  POOL_CONNECTION_STATUS_ACTIVE = 2;
  POOL_CONNECTION_STATUS_DEAD = 3;
}

// Pool defines a configured mining pool with its connection details and status
message Pool {
  // Unique identifier for the pool within the system
  int64 pool_id = 1;

  // Pool's stratum URL (e.g., "stratum+tcp://pool.example.com:3333")
  // Endpoint for connecting to the pool
  string url = 2;

  // Username or wallet address for pool authentication
  // Identifies the user/wallet receiving mining rewards
  string username = 3;

  // Pool name to identify this pool
  // Human-readable identifier for the pool within the fleet management system
  string pool_name = 4;

  // Priority of this pool (lower number = higher priority)
  // Determines the order in which miners will try to connect to pools
  int32 pool_priority = 5;

  // Current status of the pool
  // Indicates the operational state of the pool connection
  PoolConnectionStatus pool_status = 6;

  // Flag indicating whether the pool is the default pool
  // Default pool is used for new miners and when resetting to defaults
  bool is_default = 7;
}

// Request to retrieve all configured mining pools
message ListPoolsRequest {
  // Empty request as all pools are returned
}

// Response containing all configured mining pools
message ListPoolsResponse {
  // List of all configured pools, ordered by priority
  repeated Pool pools = 1;
}

// Request to create a new mining pool configuration
message CreatePoolRequest {
  // Pool configuration details for the new pool
  // Must contain all required connection information
  PoolConfig pool_config = 1;
}

// Response after creating a new mining pool
message CreatePoolResponse {
  // The newly created pool with system-assigned ID and default values
  Pool pool = 1;
}

// Request to update an existing pool's configuration
message UpdatePoolRequest {
  // Unique identifier of the pool to update
  int64 pool_id = 1;

  // New pool name (optional, leave empty to keep current value)
  string pool_name = 2;

  // New pool URL (optional, leave empty to keep current value)
  string url = 3;

  // New username (optional, leave empty to keep current value)
  string username = 4;

  // New password (optional, leave empty to keep current value)
  google.protobuf.StringValue password = 5;

  // Whether this pool should be set as the default
  // Setting to true will unset any previous default pool
  bool is_default = 6;
}

// Response after updating a pool's configuration
message UpdatePoolResponse {
  // The updated pool with all current values
  Pool pool = 1;
}

// Defines a pool's priority for ordering
message PoolPriority {
  // Unique identifier of the pool
  int64 pool_id = 1;

  // New priority value (lower number = higher priority)
  int32 priority = 2;
}

// Request to update priorities for multiple pools at once
message UpdatePoolPriorityRequest {
  // List of pools with their new priorities
  // All specified pools will have their priorities updated atomically
  repeated PoolPriority pool_priorities = 1;
}

// Response after updating pool priorities
message UpdatePoolPriorityResponse {
  // List of all pools with their updated priorities
  repeated Pool pools = 1;
}

// Request to delete a mining pool configuration
message DeletePoolRequest {
  // Unique identifier of the pool to delete
  int64 pool_id = 1;
}

// Response after deleting a pool configuration
message DeletePoolResponse {
  // Empty response as success/failure is indicated by gRPC status
}

// Request to list paired miners with pagination support
message ListPairedMinersRequest {
  // Maximum number of miners to return in a single response
  // Server may return fewer miners than specified
  // If not specified, a server-defined default will be used
  int32 page_size = 1;

  // A pagination cursor returned by a previous call to this endpoint
  // Provide this cursor to retrieve the next set of results for the original query
  // Leave empty for first request
  string cursor = 2;
}

// Response containing a list of paired miners with pagination support
message ListPairedMinersResponse {
  // List of paired miners for the current page
  // Ordered by device_identifier by default
  repeated PairedDevice miners = 1;

  // The pagination cursor to be used in a subsequent request
  // If empty, this is the final page of results
  string cursor = 2;

  // Total number of miners available across all pages
  // Useful for UI pagination controls
  int32 total_miners = 3;
}

// Represents a miner that has been paired with the fleet management system
message PairedDevice {
  // Unique identifier for the device within the fleet
  // Used as the primary reference for the device in API calls
  string device_identifier = 1;

  // Manufacturer-assigned serial number
  // Useful for physical identification and warranty purposes
  string serial_number = 2;

  // Physical MAC address of the device
  // Format: XX:XX:XX:XX:XX:XX
  // Used for network identification
  string mac_address = 3;
}

// MinerStateSnapshot represents the operational state of a mining device
// including performance metrics and component health status
// Can contain either a single point-in-time snapshot or a time series of measurements
message MinerStateSnapshot {
  // Unique identifier for the device within the fleet
  // Used as the primary reference for the device in API calls
  string device_identifier = 1;

  // Human-readable name/identifier of the miner
  string name = 2;

  // Physical MAC address of the device in XX:XX:XX:XX:XX:XX format
  string mac_address = 3;

  // Manufacturer-assigned serial number
  string serial_number = 4;

  // Power consumption measurements in kilowatts (kW)
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement power_usage = 5;

  // Temperature measurements in degrees Celsius
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement temperature = 6;

  // Hashrate measurements in TH/s (terahash per second)
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement hashrate = 7;

  // Energy efficiency measurements in joules per terahash (j/TH)
  // Lower values indicate better efficiency
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement efficiency = 8;

  // Health status of various miner components
  // Represents the current status regardless of whether time series data is requested
  MinerComponentStatus status = 9;

  // Timestamp when this snapshot was captured
  // For time series data, this represents when the most recent data was collected
  google.protobuf.Timestamp  timestamp = 10;

  string ip_address = 11;

}

// Status information for all major components in a miner
message MinerComponentStatus {
  // Status of the control board/controller
  ComponentStatus control_board = 1;

  // Status of the cooling fans (aggregate status)
  ComponentStatus fans = 2;

  // Status of the hash boards (aggregate status)
  ComponentStatus hash_boards = 3;

  // Status of the power supply unit
  ComponentStatus psu = 4;
}

// Operational status of a miner component
enum ComponentStatus {
  // Status is unknown or not specified
  COMPONENT_STATUS_UNSPECIFIED = 0;

  // Component is functioning normally
  COMPONENT_STATUS_OK = 1;

  // Component is functioning but with issues that require attention
  COMPONENT_STATUS_WARNING = 2;

  // Component has critical issues affecting operation
  COMPONENT_STATUS_ERROR = 3;

  // Component is not responding or powered off
  COMPONENT_STATUS_OFFLINE = 4;

  // Component is in a transitional state (firmware updating, pairing, etc.)
  COMPONENT_STATUS_PENDING = 5;
}


// Configuration for a specific measurement type
message MeasurementConfig {
  // Type of measurement this configuration applies to
  enum MeasurementType {
    // Measurement type not specified
    MEASUREMENT_TYPE_UNSPECIFIED = 0;
    
    // Power usage measurements
    MEASUREMENT_TYPE_POWER_USAGE = 1;
    
    // Temperature measurements
    MEASUREMENT_TYPE_TEMPERATURE = 2;
    
    // Hashrate measurements
    MEASUREMENT_TYPE_HASHRATE = 3;
    
    // Efficiency measurements
    MEASUREMENT_TYPE_EFFICIENCY = 4;
  }

  // The measurement type this configuration applies to
  MeasurementType measurement_type = 1;
  
  // Data mode for this specific measurement type
  DataMode data_mode = 2;
  
  // Time series configuration for this specific measurement type
  // Required when data_mode is TIME_SERIES
  common.v1.TimeSeriesConfig time_series_config = 3;
}

// Request to list miners with their telemetry data
message ListMinerStateSnapshotsRequest {
  // Maximum number of miners to return in a single response
  // Server may return fewer miners than specified
  // If not specified, a server-defined default will be used
  int32 page_size = 1;

  // A pagination cursor returned by a previous call to this endpoint
  // Provide this cursor to retrieve the next set of results for the original query
  // Leave empty for first request
  string cursor = 2;

  // Global data mode that applies to all measurements unless overridden
  // by a specific measurement configuration
  DataMode data_mode = 3;

  // Global time series config that applies to all measurements unless overridden
  // Required when global data_mode is TIME_SERIES and no per-measurement configs are provided
  common.v1.TimeSeriesConfig time_series_config = 4;
  
  // Per-measurement configurations that override the global settings
  // If provided for a measurement type, these settings take precedence over global settings
  repeated MeasurementConfig measurement_configs = 5;

  // Filter criteria for the miners to return
  MinerFilter filter = 6;
}

// Determines whether to return current snapshot or historical time series data
enum DataMode {
  // Server will decide based on other parameters (defaults to METADATA)
  DATA_MODE_UNSPECIFIED = 0;

  // Returns only metadata with no measurements populated
  DATA_MODE_METADATA = 1;

  // Return only the most recent measurement for each metric
  DATA_MODE_SNAPSHOT = 2;

  // Return a time series of measurements for each metric
  DATA_MODE_TIME_SERIES = 3;
}

// Filter criteria for miners
message MinerFilter {
  // Filter by component status - returns miners where any component has this status
  ComponentStatus status = 1;
}

// Response containing a list of miners with their telemetry
message ListMinerStateSnapshotsResponse {
  // List of miners with their telemetry data
  // Contains either snapshot or time series data based on the request
  repeated MinerStateSnapshot miners = 1;

  // The pagination cursor to be used in a subsequent request
  // If empty, this is the final page of results
  string cursor = 2;

  // Total number of miners available across all pages
  // Useful for UI pagination controls
  int32 total_miners = 3;
}

message StreamMinerUpdatesRequest {
  // Filter for specific miners (empty means all miners)
  repeated string device_identifiers = 1;

  // Types of measurements to stream
  repeated MeasurementConfig.MeasurementType measurement_types = 2;

  // Whether to include component status updates
  bool include_status_updates = 3;

  // Optional heartbeat interval in seconds (0 means no heartbeats)
  int32 heartbeat_interval_seconds = 4;
}

message StreamMinerUpdatesResponse {
  // Timestamp when this update was generated
  google.protobuf.Timestamp timestamp = 1;

  // Identifier of the miner this update is for
  string device_identifier = 2;

  // Type of update
  oneof update {
    // New measurement value
    MeasurementUpdate measurement = 3;

    // Component status change
    ComponentStatusUpdate status = 4;

    // Heartbeat to keep connection alive (no data)
    Heartbeat heartbeat = 5;
  }
}

message MeasurementUpdate {
  // Type of measurement being updated
  MeasurementConfig.MeasurementType measurement_type = 1;

  // The new measurement value
  common.v1.Measurement measurement = 2;
}

message ComponentStatusUpdate {
  // The component that changed status
  enum Component {
    COMPONENT_UNSPECIFIED = 0;
    COMPONENT_CONTROL_BOARD = 1;
    COMPONENT_FANS = 2;
    COMPONENT_HASH_BOARDS = 3;
    COMPONENT_PSU = 4;
  }

  // Which component changed
  Component component = 1;

  // New status of the component
  ComponentStatus status = 2;
}

message Heartbeat {
  // Empty message for heartbeat
}
