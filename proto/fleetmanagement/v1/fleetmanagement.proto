syntax = "proto3";

package fleetmanagement.v1;

import "google/protobuf/timestamp.proto";
import "common/v1/measurement.proto";
import "common/v1/cooling.proto";
import "telemetry/v1/telemetry.proto";
import "capabilities/v1/capabilities.proto";
import "errors/v1/errors.proto";
import "buf/validate/validate.proto";

// Service for managing fleet-wide settings and configurations
service FleetManagementService {
  // List all devices in the fleet (paired and/or unpaired) optionally with their telemetry data
  // Returns a paginated list of devices with their operational status and metrics
  // Use the pairing_status filter to control whether to return paired, unpaired, or both
  rpc ListMinerStateSnapshots(ListMinerStateSnapshotsRequest) returns (ListMinerStateSnapshotsResponse);

  // Get counts of miners in different states without fetching miner data
  // More efficient than ListMinerStateSnapshots when only counts are needed
  rpc GetMinerStateCounts(GetMinerStateCountsRequest) returns (GetMinerStateCountsResponse);

  // Get the current pool assignments for a specific miner
  // Returns the fleet pool IDs that match the miner's currently configured pools
  // Used to pre-populate the pool selection UI when editing a miner's pools
  rpc GetMinerPoolAssignments(GetMinerPoolAssignmentsRequest) returns (GetMinerPoolAssignmentsResponse);

  // Get the current cooling mode for a specific miner
  // Returns the cooling mode configuration from the miner
  // Used to pre-populate the cooling mode selection UI when editing a miner's settings
  rpc GetMinerCoolingMode(GetMinerCoolingModeRequest) returns (GetMinerCoolingModeResponse);

  // Delete miners from the fleet by soft-deleting their database records.
  // Immediately removes devices from the fleet and telemetry collection.
  // Attempts best-effort ClearAuthKey on Proto rigs in the background.
  rpc DeleteMiners(DeleteMinersRequest) returns (DeleteMinersResponse);

  // Get miner model groups with counts, optionally filtered by the current fleet filter
  // Used for bulk password update to show accurate model groups across the full fleet
  rpc GetMinerModelGroups(GetMinerModelGroupsRequest) returns (GetMinerModelGroupsResponse);
}

enum FleetManagementServiceErrorCode {
  FLEET_MANAGEMENT_SERVICE_ERROR_CODE_UNSPECIFIED = 0;
  FLEET_MANAGEMENT_SERVICE_ERROR_CODE_INVALID_PAGINATION_CURSOR = 1;
}

// MinerStateSnapshot represents the operational state of a mining device
// including performance metrics and component health status
// Can contain either a single point-in-time snapshot or a time series of measurements
message MinerStateSnapshot {
  // Unique identifier for the device within the fleet
  // Used as the primary reference for the device in API calls
  string device_identifier = 1;

  // Human-readable name/identifier of the miner
  string name = 2;

  // Physical MAC address of the device in XX:XX:XX:XX:XX:XX format
  string mac_address = 3;

  // Manufacturer-assigned serial number
  string serial_number = 4;

  // Power consumption measurements in kilowatts (kW)
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement power_usage = 5;

  // Temperature measurements in degrees Celsius
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement temperature = 6;

  // Hashrate measurements in TH/s (terahash per second)
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement hashrate = 7;

  // Energy efficiency measurements in joules per terahash (j/TH)
  // Lower values indicate better efficiency
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement efficiency = 8;

  // Timestamp when this snapshot was captured
  // For time series data, this represents when the most recent data was collected
  google.protobuf.Timestamp  timestamp = 9;

  string ip_address = 10;

  // The full url of the miner including protocol and port (if running on a port other than 80/443)
  string url = 11;

  // Current operational status of the device
  DeviceStatus device_status = 12;

  // Pairing status of the device
  PairingStatus pairing_status = 13;

  // Device model name (populated for unpaired devices)
  string model = 14;

  // Manufacturer name (populated for unpaired devices)
  string manufacturer = 15;

  // Device type (e.g., antminer, proto)
  string type = 16;

  // Device capabilities indicating supported features (populated for unpaired devices)
  capabilities.v1.MinerCapabilities capabilities = 17;

  // Temperature status based on current temperature value
  telemetry.v1.TemperatureStatus temperature_status = 18;

  // Firmware version installed on the device
  string firmware_version = 19;

}

// Removed MinerComponentStatus and ComponentStatus - now using error-based filtering

// Status of a miner
enum DeviceStatus {
  // Status is unknown or not specified
  DEVICE_STATUS_UNSPECIFIED = 0;

  // Miner is online and functioning normally
  DEVICE_STATUS_ONLINE = 1;

  // Miner is offline and not responding
  DEVICE_STATUS_OFFLINE = 2;

  // Miner is in maintenance mode
  DEVICE_STATUS_MAINTENANCE = 3;

  // Miner is in error state
  DEVICE_STATUS_ERROR = 4;

  // Miner is inactive, not mining but still connected
  DEVICE_STATUS_INACTIVE = 5;

  // Miner is online but needs a mining pool configured to start mining
  DEVICE_STATUS_NEEDS_MINING_POOL = 6;
}

// Request to list miners with their metadata
// Returns paginated list of miners with identification info and status
// Use GetBatchMinerTelemetry to fetch telemetry for specific miners after initial load
message ListMinerStateSnapshotsRequest {
  // Maximum number of miners to return in a single response
  // Server may return fewer miners than specified
  // If not specified, a default of 50 will be used
  // Maximum allowed value is 1000
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0,  // Allow 0 to use default
    lte: 1000  // Maximum page size
  }];

  // A pagination cursor returned by a previous call to this endpoint
  // Provide this cursor to retrieve the next set of results for the original query
  // Leave empty for first request
  string cursor = 2;

  // Filter criteria for the miners to return
  MinerListFilter filter = 3;

  // Sort configuration for results ordering
  // If not specified or empty, uses default sort by name ASC (alphabetical)
  // Currently only the first element is used; multi-column sorting reserved for future
  repeated MinerSortConfig sort = 4;
}

// Type of miner
enum MinerType {
  // Any miner type, used when filtering is not required
  MINER_TYPE_UNSPECIFIED = 0;

  // Proto Rig miner
  MINER_TYPE_PROTO_RIG = 1;

  // Bitmain miner
  MINER_TYPE_BITMAIN = 2;
}

// Pairing status of a device
enum PairingStatus {
  // Any pairing status, returns all devices (used in filters only)
  PAIRING_STATUS_UNSPECIFIED = 0;

  // Only paired devices
  PAIRING_STATUS_PAIRED = 1;

  // Only unpaired/discovered devices (no device entry exists)
  PAIRING_STATUS_UNPAIRED = 2;

  // Devices that require authentication credentials to complete pairing
  PAIRING_STATUS_AUTHENTICATION_NEEDED = 3;

  // Devices that are in the process of being paired
  PAIRING_STATUS_PENDING = 4;

  // Devices that failed to pair
  PAIRING_STATUS_FAILED = 5;
}

// Field to sort miners by in list operations
enum SortField {
  // Unspecified sort field - uses default sort (name ASC)
  SORT_FIELD_UNSPECIFIED = 0;
  // Sort by miner name
  SORT_FIELD_NAME = 1;
  // Sort by IP address (numeric comparison)
  SORT_FIELD_IP_ADDRESS = 2;
  // Sort by MAC address
  SORT_FIELD_MAC_ADDRESS = 3;
  // Reserved: STATUS (4) and ISSUES (10) sorting removed
  reserved 4, 10;
  reserved "SORT_FIELD_STATUS", "SORT_FIELD_ISSUES";
  // Sort by device model (e.g., "S21 XP", "M60")
  SORT_FIELD_MODEL = 5;
  // Sort by hashrate (TH/s)
  SORT_FIELD_HASHRATE = 6;
  // Sort by temperature (Celsius)
  SORT_FIELD_TEMPERATURE = 7;
  // Sort by power consumption (kW)
  SORT_FIELD_POWER = 8;
  // Sort by efficiency (J/TH)
  SORT_FIELD_EFFICIENCY = 9;
  // Sort by firmware version
  SORT_FIELD_FIRMWARE = 11;
}

// Direction to sort results
enum SortDirection {
  // Unspecified direction - server defaults to ASC.
  SORT_DIRECTION_UNSPECIFIED = 0;
  // Ascending order (A-Z, 0-9, lowest first)
  SORT_DIRECTION_ASC = 1;
  // Descending order (Z-A, 9-0, highest first)
  SORT_DIRECTION_DESC = 2;
}

// Configuration for sorting miner list results
message MinerSortConfig {
  // Field to sort by
  SortField field = 1 [(buf.validate.field).enum.defined_only = true];
  // Direction to sort
  SortDirection direction = 2 [(buf.validate.field).enum.defined_only = true];
}

// Removed ComponentType enum and ComponentStatusFilter - now using errors.v1.ComponentType directly

// Filter criteria for miners
// Multiple filters act as AND condition (all must match)
message MinerListFilter {
  // Filter by device status (acts as OR condition)
  // Returns miners that match any of the specified device statuses
  repeated DeviceStatus device_status = 3;

  // Filter by component types that have errors (acts as OR condition)
  // Returns miners that have errors for any of the specified component types
  // Uses ComponentType from errors.v1 package
  repeated errors.v1.ComponentType error_component_types = 4;

  // Filter by device models (acts as OR condition)
  // Returns miners that match any of the specified model names (e.g., "S21 XP", "M60")
  repeated string models = 5;

  // Filter by pairing statuses (acts as OR condition)
  // Returns miners that match any of the specified pairing statuses
  // If empty or only contains PAIRING_STATUS_UNSPECIFIED, returns all devices
  // Examples:
  //   [PAIRED] - Only paired devices
  //   [UNPAIRED] - Only unpaired devices
  //   [PAIRED, AUTHENTICATION_NEEDED] - Paired devices + devices needing auth
  //   [AUTHENTICATION_NEEDED, FAILED] - Devices needing attention
  //   [] or [UNSPECIFIED] - All devices
  repeated PairingStatus pairing_statuses = 6;
}


// Response containing a list of miners with their telemetry
// Used by both ListMinerStateSnapshots (one-time query) and StreamFilteredMinerList (streaming updates)
message ListMinerStateSnapshotsResponse {
  // List of miners with their telemetry data
  // Contains either snapshot or time series data based on the request
  repeated MinerStateSnapshot miners = 1;

  // The pagination cursor to be used in a subsequent request
  // If empty, this is the final page of results
  string cursor = 2;

  // Total number of miners available across all pages
  // Useful for UI pagination controls
  int32 total_miners = 3;

  // Counts of miners in different states
  // This includes counts for all miners, not just the ones in the current page
  // Status filters do not affect these counts, because they act as OR condition.
  telemetry.v1.MinerStateCounts total_state_counts = 4;

  // List of all device models that exist in the user's fleet
  // Useful for dynamically building model filter options in the UI
  // This includes all models across all pages, not just the current page (e.g., "S21 XP", "M60")
  repeated string models = 5;
}

// Request for getting miner state counts without fetching miner data
message GetMinerStateCountsRequest {
  // Reserved for future use
}

// Response containing miner state counts
message GetMinerStateCountsResponse {
  // Total number of miners matching the filter
  int32 total_miners = 1;

  // Counts of miners in different states
  telemetry.v1.MinerStateCounts state_counts = 2;
}

// Request to get the current pool assignments for a specific miner
message GetMinerPoolAssignmentsRequest {
  // Device identifier of the miner to get pool assignments for
  string device_identifier = 1 [(buf.validate.field).required = true];
}

// A single pool assignment from a miner's configuration
// Groups the pool ID (if matched to a fleet pool) with the raw URL and username
message PoolAssignment {
  // Fleet pool ID if this pool matches a fleet pool definition
  // Absent if the pool doesn't match any fleet pool
  optional int64 pool_id = 1;

  // Raw pool URL as configured on the miner
  string url = 2;

  // Username as configured on the miner
  string username = 3;
}

// Response containing the miner's current pool assignments
// Pools are returned in priority order: index 0 = default (priority 0), index 1 = backup1 (priority 1), etc.
// If a pool is configured on the miner but doesn't match any fleet pool, the pool_id will be absent
message GetMinerPoolAssignmentsResponse {
  // Pool assignments in priority order (max 3: default, backup1, backup2)
  // Empty if no pools are configured on the miner
  repeated PoolAssignment pools = 1;
}

// A single model group result with count
message MinerModelGroup {
  string model = 1;
  string manufacturer = 2;
  int32 count = 3;
}

// Request to get miner model groups with counts
message GetMinerModelGroupsRequest {
  MinerListFilter filter = 1;
}

// Response containing miner model groups with counts
message GetMinerModelGroupsResponse {
  repeated MinerModelGroup groups = 1;
}

// Request to get the current cooling mode for a specific miner
message GetMinerCoolingModeRequest {
  // Device identifier of the miner to get cooling mode for
  string device_identifier = 1 [(buf.validate.field).required = true];
}

// Response containing the miner's current cooling mode
message GetMinerCoolingModeResponse {
  // Current cooling mode of the miner
  // UNSPECIFIED if the miner doesn't support cooling mode configuration
  // An RPC error is returned if the miner could not be queried
  common.v1.CoolingMode cooling_mode = 1;
}

// Selects devices for fleet management operations.
// Follows the same oneof pattern as minercommand.v1.DeviceSelector.
message DeviceSelector {
  oneof selection_type {
    // Select all paired devices, optionally filtered.
    // An empty filter selects all paired devices in the org.
    MinerListFilter all_devices = 1;
    // Select specific devices by identifier.
    DeviceIdentifierList include_devices = 2;
  }
}

message DeviceIdentifierList {
  repeated string device_identifiers = 1;
}

// Request to delete miners from the fleet.
message DeleteMinersRequest {
  DeviceSelector device_selector = 1;
}

// Response from deleting miners
message DeleteMinersResponse {
  // Number of devices successfully deleted
  int32 deleted_count = 1;
}
