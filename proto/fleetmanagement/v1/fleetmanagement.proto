syntax = "proto3";

package fleetmanagement.v1;

import "google/protobuf/timestamp.proto";
import "common/v1/measurement.proto";
import "telemetry/v1/telemetry.proto";
import "capabilities/v1/capabilities.proto";
import "buf/validate/validate.proto";

// Service for managing fleet-wide settings and configurations
service FleetManagementService {
  // List all devices in the fleet (paired and/or unpaired) optionally with their telemetry data
  // Returns a paginated list of devices with their operational status and metrics
  // Use the pairing_status filter to control whether to return paired, unpaired, or both
  rpc ListMinerStateSnapshots(ListMinerStateSnapshotsRequest) returns (ListMinerStateSnapshotsResponse);

  // Stream real-time measurement updates for miners
  rpc StreamMinerUpdates(StreamMinerUpdatesRequest) returns (stream StreamMinerUpdatesResponse);

  // Stream incremental updates (additions/removals) for filtered miner list
  // Sends initial snapshot, then delta updates when miners enter/exit filter criteria
  // More efficient than sending full snapshots on each change
  rpc StreamMinerListUpdates(StreamMinerListUpdatesRequest) returns (stream StreamMinerListUpdatesResponse);

  // Get counts of miners in different states without fetching miner data
  // More efficient than ListMinerStateSnapshots when only counts are needed
  rpc GetMinerStateCounts(GetMinerStateCountsRequest) returns (GetMinerStateCountsResponse);

  // Get telemetry data for a batch of miners by their device identifiers
  // This is optimized for fetching telemetry for multiple miners in a single request
  // Use this after initial metadata-only list load to populate telemetry for visible rows
  rpc GetBatchMinerTelemetry(GetBatchMinerTelemetryRequest) returns (GetBatchMinerTelemetryResponse);
}

enum FleetManagementServiceErrorCode {
  FLEET_MANAGEMENT_SERVICE_ERROR_CODE_UNSPECIFIED = 0;
  FLEET_MANAGEMENT_SERVICE_ERROR_CODE_INVALID_PAGINATION_CURSOR = 1;
}

// MinerStateSnapshot represents the operational state of a mining device
// including performance metrics and component health status
// Can contain either a single point-in-time snapshot or a time series of measurements
message MinerStateSnapshot {
  // Unique identifier for the device within the fleet
  // Used as the primary reference for the device in API calls
  string device_identifier = 1;

  // Human-readable name/identifier of the miner
  string name = 2;

  // Physical MAC address of the device in XX:XX:XX:XX:XX:XX format
  string mac_address = 3;

  // Manufacturer-assigned serial number
  string serial_number = 4;

  // Power consumption measurements in kilowatts (kW)
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement power_usage = 5;

  // Temperature measurements in degrees Celsius
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement temperature = 6;

  // Hashrate measurements in TH/s (terahash per second)
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement hashrate = 7;

  // Energy efficiency measurements in joules per terahash (j/TH)
  // Lower values indicate better efficiency
  // Contains either a single current value or a time series based on request parameters
  repeated common.v1.Measurement efficiency = 8;

  // Health status of various miner components
  // Represents the current status regardless of whether time series data is requested
  MinerComponentStatus status = 9;

  // Timestamp when this snapshot was captured
  // For time series data, this represents when the most recent data was collected
  google.protobuf.Timestamp  timestamp = 10;

  string ip_address = 11;

  // The full url of the miner including protocol and port (if running on a port other than 80/443)
  string url = 12;

  // Current operational status of the device
  DeviceStatus device_status = 13;

  // Pairing status of the device
  PairingStatus pairing_status = 14;

  // Device model name (populated for unpaired devices)
  string model = 15;

  // Manufacturer name (populated for unpaired devices)
  string manufacturer = 16;

  // Device type (e.g., antminer, proto)
  string type = 17;

  // Device capabilities indicating supported features (populated for unpaired devices)
  capabilities.v1.MinerCapabilities capabilities = 18;

  // Temperature status based on current temperature value
  telemetry.v1.TemperatureStatus temperature_status = 19;

}

// Status information for all major components in a miner
message MinerComponentStatus {
  // Status of the control board/controller
  ComponentStatus control_board = 1;

  // Status of the cooling fans (aggregate status)
  ComponentStatus fans = 2;

  // Status of the hash boards (aggregate status)
  ComponentStatus hash_boards = 3;

  // Status of the power supply unit
  ComponentStatus psu = 4;
}

// Operational status of a miner component
enum ComponentStatus {
  // Status is unknown or not specified
  COMPONENT_STATUS_UNSPECIFIED = 0;

  // Component is functioning normally
  COMPONENT_STATUS_OK = 1;

  // Component is functioning but with issues that require attention
  COMPONENT_STATUS_WARNING = 2;

  // Component has critical issues affecting operation
  COMPONENT_STATUS_ERROR = 3;

  // Component is not responding or powered off
  COMPONENT_STATUS_OFFLINE = 4;

  // Component is in a transitional state (firmware updating, pairing, etc.)
  COMPONENT_STATUS_PENDING = 5;
}

// Status of a miner
enum DeviceStatus {
  // Status is unknown or not specified
  DEVICE_STATUS_UNSPECIFIED = 0;

  // Miner is online and functioning normally
  DEVICE_STATUS_ONLINE = 1;

  // Miner is offline and not responding
  DEVICE_STATUS_OFFLINE = 2;

  // Miner is in maintenance mode
  DEVICE_STATUS_MAINTENANCE = 3;

  // Miner is in error state
  DEVICE_STATUS_ERROR = 4;

  // Miner is inactive and not responding
  DEVICE_STATUS_INACTIVE = 5;

}

// Configuration for a specific measurement type
message MeasurementConfig {
  // Type of measurement this configuration applies to
  enum MeasurementType {
    // Measurement type not specified
    MEASUREMENT_TYPE_UNSPECIFIED = 0;
    
    // Power usage measurements
    MEASUREMENT_TYPE_POWER_USAGE = 1;
    
    // Temperature measurements
    MEASUREMENT_TYPE_TEMPERATURE = 2;
    
    // Hashrate measurements
    MEASUREMENT_TYPE_HASHRATE = 3;
    
    // Efficiency measurements
    MEASUREMENT_TYPE_EFFICIENCY = 4;
  }

  // The measurement type this configuration applies to
  MeasurementType measurement_type = 1;
  
  // Data mode for this specific measurement type
  DataMode data_mode = 2;
  
  // Time series configuration for this specific measurement type
  // Required when data_mode is TIME_SERIES
  common.v1.TimeSeriesConfig time_series_config = 3;
}

// Request to list miners with their metadata (no telemetry data)
// Returns paginated list of miners with identification info and status
// Use GetBatchMinerTelemetry to fetch telemetry for specific miners after initial load
message ListMinerStateSnapshotsRequest {
  // Maximum number of miners to return in a single response
  // Server may return fewer miners than specified
  // If not specified, a default of 50 will be used
  // Maximum allowed value is 1000
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0,  // Allow 0 to use default
    lte: 1000  // Maximum page size
  }];

  // A pagination cursor returned by a previous call to this endpoint
  // Provide this cursor to retrieve the next set of results for the original query
  // Leave empty for first request
  string cursor = 2;

  // Filter criteria for the miners to return
  MinerListFilter filter = 6;

  // Reserved field numbers for removed fields (data_mode, time_series_config, measurement_configs)
  reserved 3, 4, 5;
  reserved "data_mode", "time_series_config", "measurement_configs";
}

// Determines whether to return current snapshot or historical time series data
enum DataMode {
  // Server will decide based on other parameters (defaults to METADATA)
  DATA_MODE_UNSPECIFIED = 0;

  // Returns only metadata with no measurements populated
  DATA_MODE_METADATA = 1;

  // Return only the most recent measurement for each metric
  DATA_MODE_SNAPSHOT = 2;

  // Return a time series of measurements for each metric
  DATA_MODE_TIME_SERIES = 3;
}

// Type of miner
enum MinerType {
  // Any miner type, used when filtering is not required
  MINER_TYPE_UNSPECIFIED = 0;

  // Proto Rig miner
  MINER_TYPE_PROTO_RIG = 1;

  // Bitmain miner
  MINER_TYPE_BITMAIN = 2;
}

// Pairing status of a device
enum PairingStatus {
  // Any pairing status, returns all devices (used in filters only)
  PAIRING_STATUS_UNSPECIFIED = 0;

  // Only paired devices
  PAIRING_STATUS_PAIRED = 1;

  // Only unpaired/discovered devices (no device entry exists)
  PAIRING_STATUS_UNPAIRED = 2;

  // Devices that require authentication credentials to complete pairing
  PAIRING_STATUS_AUTHENTICATION_NEEDED = 3;

  // Devices that are in the process of being paired
  PAIRING_STATUS_PENDING = 4;

  // Devices that failed to pair
  PAIRING_STATUS_FAILED = 5;
}

// Component type for filtering
enum ComponentType {
  COMPONENT_TYPE_UNSPECIFIED = 0;
  COMPONENT_TYPE_CONTROL_BOARD = 1;
  COMPONENT_TYPE_FANS = 2;
  COMPONENT_TYPE_HASH_BOARDS = 3;
  COMPONENT_TYPE_PSU = 4;
}

// Filter for a specific component with one or more statuses
message ComponentStatusFilter {
  // The component to filter by
  ComponentType component = 1;

  // One or more statuses to filter by (acts as OR condition)
  // Returns miners where the specified component has any of these statuses
  repeated ComponentStatus statuses = 2;
}

// Filter criteria for miners
// Multiple filters act as AND condition (all must match)
message MinerListFilter {
  // Filter by device status (acts as OR condition)
  // Returns miners that match any of the specified device statuses
  repeated DeviceStatus device_status = 3;

  // Filter by specific component statuses
  // Multiple component filters act as AND condition (all must match)
  // Within each component filter, statuses act as OR condition
  // Example: To find miners with fans in WARNING or ERROR status AND hash_boards in ERROR status,
  // provide two ComponentStatusFilter entries
  repeated ComponentStatusFilter component_filters = 4;

  // Filter by miner types (acts as OR condition)
  // Returns miners that match any of the specified types
  repeated MinerType types = 5;

  // Filter by pairing statuses (acts as OR condition)
  // Returns miners that match any of the specified pairing statuses
  // If empty or only contains PAIRING_STATUS_UNSPECIFIED, returns all devices
  // Examples:
  //   [PAIRED] - Only paired devices
  //   [UNPAIRED] - Only unpaired devices
  //   [PAIRED, AUTHENTICATION_NEEDED] - Paired devices + devices needing auth
  //   [AUTHENTICATION_NEEDED, FAILED] - Devices needing attention
  //   [] or [UNSPECIFIED] - All devices
  repeated PairingStatus pairing_statuses = 6;
}


// Response containing a list of miners with their telemetry
// Used by both ListMinerStateSnapshots (one-time query) and StreamFilteredMinerList (streaming updates)
message ListMinerStateSnapshotsResponse {
  // List of miners with their telemetry data
  // Contains either snapshot or time series data based on the request
  repeated MinerStateSnapshot miners = 1;

  // The pagination cursor to be used in a subsequent request
  // If empty, this is the final page of results
  string cursor = 2;

  // Total number of miners available across all pages
  // Useful for UI pagination controls
  int32 total_miners = 3;

  // Counts of miners in different states
  // This includes counts for all miners, not just the ones in the current page
  // Status filters do not affect these counts, because they act as OR condition.
  telemetry.v1.MinerStateCounts total_state_counts = 4;

  // List of all miner types that exist in the user's fleet
  // Useful for dynamically building type filter options in the UI
  // This includes all types across all pages, not just the current page
  repeated MinerType miner_types = 5;
}

// Request for getting miner state counts without fetching miner data
message GetMinerStateCountsRequest {
  // Reserved for future use
}

// Response containing miner state counts
message GetMinerStateCountsResponse {
  // Total number of miners matching the filter
  int32 total_miners = 1;

  // Counts of miners in different states
  telemetry.v1.MinerStateCounts state_counts = 2;
}

message StreamMinerUpdatesRequest {
  // Filter for specific miners (empty means all miners)
  repeated string device_identifiers = 1;

  // Types of measurements to stream
  repeated MeasurementConfig.MeasurementType measurement_types = 2;

  // Whether to include component status updates
  bool include_status_updates = 3;

  // Optional heartbeat interval in seconds (0 means no heartbeats)
  int32 heartbeat_interval_seconds = 4;
}

message StreamMinerUpdatesResponse {
  // Timestamp when this update was generated
  google.protobuf.Timestamp timestamp = 1;

  // Identifier of the miner this update is for
  string device_identifier = 2;

  // Type of update
  oneof update {
    // New measurement value
    MeasurementUpdate measurement = 3;

    // Component status change
    ComponentStatusUpdate status = 4;

    // Heartbeat to keep connection alive (no data)
    Heartbeat heartbeat = 5;

    // Device status update
    DeviceStatusUpdate device_status = 6;
  }
}

message MeasurementUpdate {
  // Type of measurement being updated
  MeasurementConfig.MeasurementType measurement_type = 1;

  // The new measurement value
  common.v1.Measurement measurement = 2;
}

message ComponentStatusUpdate {
  // The component that changed status
  enum Component {
    COMPONENT_UNSPECIFIED = 0;
    COMPONENT_CONTROL_BOARD = 1;
    COMPONENT_FANS = 2;
    COMPONENT_HASH_BOARDS = 3;
    COMPONENT_PSU = 4;
  }

  // Which component changed
  Component component = 1;

  // New status of the component
  ComponentStatus status = 2;
}

message Heartbeat {
  // Empty message for heartbeat
}

message DeviceStatusUpdate {
  // The new status of the device
  DeviceStatus status = 1;
}

// Request to stream incremental updates for a filtered miner list
// Provides delta updates when miners move in/out of filter criteria
// Tracks ALL miners matching the filter to ensure complete delta accuracy
message StreamMinerListUpdatesRequest {
  // Filter criteria for miners to track
  MinerListFilter filter = 1;

  // Global data mode for measurements (for initial snapshot and additions)
  DataMode data_mode = 2;

  // Global time series config (if using TIME_SERIES mode)
  common.v1.TimeSeriesConfig time_series_config = 3;

  // Per-measurement configurations
  repeated MeasurementConfig measurement_configs = 4;

  // Heartbeat interval in seconds (0 means no heartbeats)
  int32 heartbeat_interval_seconds = 5;
}

// Response containing incremental updates to the filtered miner list
message StreamMinerListUpdatesResponse {
  // Timestamp when this update was generated
  google.protobuf.Timestamp timestamp = 1;

  // Type of update
  oneof update {
    // Delta updates - sent when list composition changes
    MinerListDelta delta = 2;

    // Heartbeat to keep connection alive
    Heartbeat heartbeat = 3;
  }
}

// Delta update containing additions and removals
message MinerListDelta {
  // Miners that now match the filter criteria (entered the list)
  repeated MinerAddition additions = 1;

  // Device IDs of miners that no longer match the filter (left the list)
  repeated string removals = 2;

  // Total miners matching the filter after applying delta
  int32 total_miners = 3;
}

// Represents a miner being added to the filtered list
message MinerAddition {
  // The miner's current state snapshot
  MinerStateSnapshot miner = 1;

  // Position where the miner should be inserted (for maintaining sort order)
  int32 position = 2;
}

// Request to get telemetry data for a batch of miners
message GetBatchMinerTelemetryRequest {
  // Device identifiers of miners to fetch telemetry for
  // Maximum of 100 device IDs per request
  repeated string device_identifiers = 1 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 100
  }];

  // Global data mode that applies to all measurements unless overridden
  // by a specific measurement configuration
  DataMode data_mode = 2;

  // Global time series config that applies to all measurements unless overridden
  // Required when global data_mode is TIME_SERIES and no per-measurement configs are provided
  common.v1.TimeSeriesConfig time_series_config = 3;

  // Per-measurement configurations that override the global settings
  // If provided for a measurement type, these settings take precedence over global settings
  repeated MeasurementConfig measurement_configs = 4;
}

// Response containing telemetry data for a batch of miners
message GetBatchMinerTelemetryResponse {
  // Telemetry data for each requested miner
  // Key is the device_identifier, value contains the telemetry measurements
  repeated MinerTelemetry miners = 1;
}

// Telemetry data for a single miner
message MinerTelemetry {
  // Device identifier this telemetry belongs to
  string device_identifier = 1;

  // Power consumption measurements in kilowatts (kW)
  repeated common.v1.Measurement power_usage = 2;

  // Temperature measurements in degrees Celsius
  repeated common.v1.Measurement temperature = 3;

  // Hashrate measurements in TH/s (terahash per second)
  repeated common.v1.Measurement hashrate = 4;

  // Energy efficiency measurements in joules per terahash (j/TH)
  repeated common.v1.Measurement efficiency = 5;

  // Health status of various miner components
  MinerComponentStatus status = 6;

  // Timestamp when this telemetry was captured
  google.protobuf.Timestamp timestamp = 7;

  // Current operational status of the device
  DeviceStatus device_status = 8;
}
