syntax = "proto3";

// Connect-RPC surface proxying the Grafana sidecar; fleet-api is the security boundary that scopes every read/write to the caller's org. No rule-authoring surface by design (the rule set is provisioned by ops YAML).
package notifications.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// ChannelService manages delivery destinations, backed by Grafana contact points.
service ChannelService {
    // Secrets are zeroed on reads; Channel.has_secret signals presence.
    rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);

    rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);

    // Editing the destination clears the validation state.
    rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);

    rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);

    // Sends a synthetic alert through the channel without requiring it to be saved.
    rpc TestChannel(TestChannelRequest) returns (TestChannelResponse);
}

// RuleService is read-only plus pause/resume; rules are fixed by provisioned YAML (no create/update/delete).
service RuleService {
    rpc ListRules(ListRulesRequest) returns (ListRulesResponse);

    // Idempotent.
    rpc PauseRule(PauseRuleRequest) returns (PauseRuleResponse);

    // Idempotent.
    rpc ResumeRule(ResumeRuleRequest) returns (ResumeRuleResponse);
}

// SilenceService manages temporary mutes, backed by Grafana's Alertmanager silences API.
service SilenceService {
    rpc ListSilences(ListSilencesRequest) returns (ListSilencesResponse);
    rpc CreateSilence(CreateSilenceRequest) returns (CreateSilenceResponse);
    rpc UpdateSilence(UpdateSilenceRequest) returns (UpdateSilenceResponse);
    rpc DeleteSilence(DeleteSilenceRequest) returns (DeleteSilenceResponse);
}

// HistoryService is read-only access to the delivered-notification log, scoped to the caller's org.
service HistoryService {
    // Newest first, keyset-paginated on the entry id.
    rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
}

enum ChannelKind {
    CHANNEL_KIND_UNSPECIFIED = 0;
    CHANNEL_KIND_WEBHOOK = 1;
    CHANNEL_KIND_SMTP = 2;
    CHANNEL_KIND_SLACK = 3;
}

enum ValidationState {
    VALIDATION_STATE_UNSPECIFIED = 0;
    VALIDATION_STATE_PENDING = 1;
    VALIDATION_STATE_OK = 2;
    VALIDATION_STATE_FAILED = 3;
}

message WebhookConfig {
    string url = 1;
    // Write-only secret; empty on reads, presence signalled by Channel.has_secret.
    string bearer_header = 2;
}

message SmtpConfig {
    string host = 1;
    int32 port = 2;
    string username = 3;
    string from = 4;
    repeated string to = 5;
    // Write-only; readbacks are always empty.
    string password = 6;
}

message SlackConfig {
    // The incoming-webhook URL embeds a capability token, so the whole value is a write-only secret.
    string webhook_url = 1;
}

message Channel {
    string id = 1;
    int64 organization_id = 2;
    string name = 3;
    ChannelKind kind = 4;
    WebhookConfig webhook = 5;
    SmtpConfig smtp = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
    google.protobuf.Timestamp validated_at = 9;
    ValidationState validation_state = 10;
    string validation_error = 11;
    // True when a secret is stored, so the UI can render "•••• Set" without leaking it.
    bool has_secret = 12;
    SlackConfig slack = 13;
}

message ListChannelsRequest {}
message ListChannelsResponse {
    repeated Channel channels = 1;
}

message CreateChannelRequest {
    string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    ChannelKind kind = 2;
    WebhookConfig webhook = 3;
    SmtpConfig smtp = 4;
    SlackConfig slack = 5;
}
message CreateChannelResponse {
    Channel channel = 1;
}

message UpdateChannelRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
    string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    ChannelKind kind = 3;
    WebhookConfig webhook = 4;
    SmtpConfig smtp = 5;
    SlackConfig slack = 6;
}
message UpdateChannelResponse {
    Channel channel = 1;
}

message DeleteChannelRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteChannelResponse {}

message TestChannelRequest {
    // Either an existing id or an unsaved definition; the unsaved definition wins when both are set.
    string id = 1;
    ChannelKind kind = 2;
    WebhookConfig webhook = 3;
    SmtpConfig smtp = 4;
    SlackConfig slack = 5;
}
message TestChannelResponse {
    bool ok = 1;
    string error = 2;
    int32 response_code = 3;
}

// Closed set of rule kinds from the provisioned YAML; unrecognised maps to RULE_TEMPLATE_UNSPECIFIED.
enum RuleTemplate {
    RULE_TEMPLATE_UNSPECIFIED = 0;
    RULE_TEMPLATE_OFFLINE = 1;
    RULE_TEMPLATE_HASHRATE = 2;
    RULE_TEMPLATE_TEMPERATURE = 3;
    RULE_TEMPLATE_POOL = 4;
    RULE_TEMPLATE_COMMAND_FAILURE = 5;
    RULE_TEMPLATE_TELEMETRY_POLL = 6;
}

message Rule {
    // Grafana alert-rule UID, stable across deploys because the YAML pins it.
    string id = 1;
    int64 organization_id = 2;
    string name = 3;
    RuleTemplate template = 4;
    string group = 5;
    string severity = 6;
    string summary = 7;
    string description = 8;
    // Parsed from Grafana's `for:` window.
    int32 duration_seconds = 9;
    // Inverse of Grafana's isPaused.
    bool enabled = 10;
}

message ListRulesRequest {}
message ListRulesResponse {
    repeated Rule rules = 1;
}

message PauseRuleRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message PauseRuleResponse {
    Rule rule = 1;
}

message ResumeRuleRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message ResumeRuleResponse {
    Rule rule = 1;
}

enum SilenceScopeKind {
    SILENCE_SCOPE_KIND_UNSPECIFIED = 0;
    SILENCE_SCOPE_KIND_RULE = 1;
    SILENCE_SCOPE_KIND_GROUP = 2;
    SILENCE_SCOPE_KIND_SITE = 3;
    SILENCE_SCOPE_KIND_DEVICE = 4;
}

message SilenceScope {
    SilenceScopeKind kind = 1;
    string rule_id = 2;
    string group_id = 3;
    string site_id = 4;
    repeated string device_ids = 5;
}

message Silence {
    string id = 1;
    int64 organization_id = 2;
    SilenceScope scope = 3;
    google.protobuf.Timestamp starts_at = 4;
    google.protobuf.Timestamp ends_at = 5;
    string comment = 6;
    string created_by = 7;
    google.protobuf.Timestamp created_at = 8;
    bool active = 9;
}

message ListSilencesRequest {}
message ListSilencesResponse {
    repeated Silence silences = 1;
}

message CreateSilenceRequest {
    SilenceScope scope = 1;
    google.protobuf.Timestamp starts_at = 2;
    google.protobuf.Timestamp ends_at = 3;
    string comment = 4 [(buf.validate.field).string.max_len = 1024];
}
message CreateSilenceResponse {
    Silence silence = 1;
}

message UpdateSilenceRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
    SilenceScope scope = 2;
    google.protobuf.Timestamp starts_at = 3;
    google.protobuf.Timestamp ends_at = 4;
    string comment = 5 [(buf.validate.field).string.max_len = 1024];
}
message UpdateSilenceResponse {
    Silence silence = 1;
}

message DeleteSilenceRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteSilenceResponse {}

// One delivered alert; fields are denormalized from the inbound alert, free-form strings since they originate from Grafana.
message NotificationHistoryEntry {
    string id = 1;
    google.protobuf.Timestamp received_at = 2;
    string alert_name = 3;
    string status = 4;
    string severity = 5;
    string rule_group = 6;
    string fingerprint = 7;
    string device_id = 8;
    string device_name = 9;
    string device_mac = 10;
    string template = 11;
    string summary = 12;
    google.protobuf.Timestamp starts_at = 13;
    google.protobuf.Timestamp ends_at = 14;
}

message ListNotificationsRequest {
    // Keyset cursor: returns entries with id < before_id; empty for the first page.
    string before_id = 1;
    // Clamped server-side; 0 means "use the default".
    int32 page_size = 2 [(buf.validate.field).int32.gte = 0];
}
message ListNotificationsResponse {
    repeated NotificationHistoryEntry notifications = 1;
    bool has_more = 2;
}
