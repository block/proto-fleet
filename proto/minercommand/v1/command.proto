syntax = "proto3";

package minercommand.v1;

import "google/protobuf/timestamp.proto";

message DeviceSelector {
  oneof selection_type {
    bool all_devices = 1;
    DeviceList include_devices = 2;
  }
}

message DeviceList {
  repeated string device_identifiers = 1;
}

// Request to stop mining on specific miners
message StopMiningRequest {
  DeviceSelector device_selector = 1;
}

// Response from stop mining request
message StopMiningResponse {
  string batch_identifier = 1;
}

// Request to start mining on specific miners
message StartMiningRequest {
  DeviceSelector device_selector = 1;
}

// Response from start mining request
message StartMiningResponse {
  string batch_identifier = 1;
}

enum CoolingMode {
  COOLING_MODE_UNSPECIFIED = 0;
  COOLING_MODE_AIR_COOLED = 1;
  COOLING_MODE_IMMERSION_COOLED = 2;
}

message SetCoolingModeRequest {
  DeviceSelector device_selector = 1;
  CoolingMode mode = 2;
}

message SetCoolingModeResponse {
  string batch_identifier = 1;
}

message UpdateMiningPoolsRequest {
  DeviceSelector device_selector = 1;
  int64 default_pool_id = 2;
  optional int64 backup_1_pool_id = 3;
  optional int64 backup_2_pool_id = 4;
}

message UpdateMiningPoolsResponse {
  string batch_identifier = 1;
}

message DownloadLogsRequest {
  DeviceSelector device_selector = 1;
}

message DownloadLogsResponse {
  string batch_identifier = 1;
}

message StreamCommandBatchUpdatesRequest {
  // The identifier of the command batch to stream
  string batch_identifier = 1;
}

message StreamCommandBatchUpdatesResponse {
  // Timestamp when this update was generated
  google.protobuf.Timestamp timestamp = 1;

  // Identifier of the command batch this update is for
  string command_batch_identifier = 2;

  CommandBatchUpdateStatus status = 3;
}

message CommandBatchUpdateDeviceCount {
  int64 total = 1;
  int64 success = 2;
  int64 failure = 3;
}

message CommandBatchUpdateStatus {
  enum CommandBatchUpdateStatusType {
    COMMAND_BATCH_UPDATE_STATUS_TYPE_UNSPECIFIED = 0;
    COMMAND_BATCH_UPDATE_STATUS_TYPE_PENDING = 1;
    COMMAND_BATCH_UPDATE_STATUS_TYPE_PROCESSING = 2;
    COMMAND_BATCH_UPDATE_STATUS_TYPE_FINISHED = 3;
  }

  CommandBatchUpdateStatusType command_batch_update_status = 1;

  CommandBatchUpdateDeviceCount command_batch_device_count = 2;
}

message GetCommandBatchLogBundleRequest {
  string batch_identifier = 1;
}

message GetCommandBatchLogBundleResponse {
  bytes chunk_data = 1;
  string filename = 2;
}

// Service for executing Miner commands
service MinerCommandService {
  // Stops mining on specified miners
  // The operation is attempted on all miners even if some fail
  rpc StopMining(StopMiningRequest) returns (StopMiningResponse);

  // Starts mining on specified miners
  // The operation is attempted on all miners even if some fail
  rpc StartMining(StartMiningRequest) returns (StartMiningResponse);

  rpc SetCoolingMode(SetCoolingModeRequest) returns (SetCoolingModeResponse);

  rpc UpdateMiningPools(UpdateMiningPoolsRequest) returns (UpdateMiningPoolsResponse);

  rpc DownloadLogs(DownloadLogsRequest) returns (DownloadLogsResponse);

  // Streams command batch updates
  rpc StreamCommandBatchUpdates(StreamCommandBatchUpdatesRequest) returns (stream StreamCommandBatchUpdatesResponse);

  rpc GetCommandBatchLogBundle(GetCommandBatchLogBundleRequest) returns (GetCommandBatchLogBundleResponse);
}
