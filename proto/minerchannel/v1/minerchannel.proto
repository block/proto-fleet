syntax = "proto3";

package minerchannel.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// MinerChannelService manages desired-state cells over exclusive device sets.
service MinerChannelService {
    // CreateMinerChannel creates a non-default miner channel from explicit devices, a
    // selector, or a frozen snapshot of a device set.
    rpc CreateMinerChannel(CreateMinerChannelRequest) returns (CreateMinerChannelResponse);

    // UpdateMinerChannel changes operator-owned metadata and desired state.
    rpc UpdateMinerChannel(UpdateMinerChannelRequest) returns (UpdateMinerChannelResponse);

    // SetMinerChannelFirmwareTarget sets or clears desired firmware for one miner type.
    rpc SetMinerChannelFirmwareTarget(SetMinerChannelFirmwareTargetRequest) returns (SetMinerChannelFirmwareTargetResponse);

    // AddDevicesToMinerChannel moves explicit devices into a miner channel.
    rpc AddDevicesToMinerChannel(AddDevicesToMinerChannelRequest) returns (AddDevicesToMinerChannelResponse);

    // RemoveDevicesFromMinerChannel moves explicit devices back to the default miner channel.
    rpc RemoveDevicesFromMinerChannel(RemoveDevicesFromMinerChannelRequest) returns (RemoveDevicesFromMinerChannelResponse);

    // ReleaseMinerChannel releases all members back to default and marks the miner channel released.
    rpc ReleaseMinerChannel(ReleaseMinerChannelRequest) returns (ReleaseMinerChannelResponse);

    // DeleteMinerChannel administratively soft-deletes a miner channel.
    rpc DeleteMinerChannel(DeleteMinerChannelRequest) returns (DeleteMinerChannelResponse);

    // GetMinerChannel returns a single miner channel and its explicit members.
    rpc GetMinerChannel(GetMinerChannelRequest) returns (GetMinerChannelResponse);

    // ListMinerChannels lists miner channels for the caller's organization.
    rpc ListMinerChannels(ListMinerChannelsRequest) returns (ListMinerChannelsResponse);

    // GetMyMinerChannels lists miner channels owned by the caller.
    rpc GetMyMinerChannels(GetMyMinerChannelsRequest) returns (GetMyMinerChannelsResponse);

    // ListDevices returns devices with their effective miner channel and desired state.
    rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);

    // AdminReassign force-moves devices across miner channels.
    rpc AdminReassign(AdminReassignRequest) returns (AdminReassignResponse);

    // AdminReleaseMinerChannel force-releases another owner's miner channel.
    rpc AdminReleaseMinerChannel(AdminReleaseMinerChannelRequest) returns (AdminReleaseMinerChannelResponse);
}

enum MinerChannelState {
    MINER_CHANNEL_STATE_UNSPECIFIED = 0;
    MINER_CHANNEL_STATE_ACTIVE = 1;
    MINER_CHANNEL_STATE_RELEASED = 2;
}

enum MinerChannelFirmwareRolloutState {
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_UNSPECIFIED = 0;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_NO_TARGET = 1;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_QUEUED = 2;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_UPDATING = 3;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_VERIFYING = 4;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_COMPLETE = 5;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_NEEDS_ATTENTION = 6;
    MINER_CHANNEL_FIRMWARE_ROLLOUT_STATE_UNKNOWN = 7;
}

enum MinerChannelConfigDimension {
    MINER_CHANNEL_CONFIG_DIMENSION_UNSPECIFIED = 0;
    MINER_CHANNEL_CONFIG_DIMENSION_POOLS = 1;
}

enum MinerChannelConfigLifecycleState {
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_UNSPECIFIED = 0;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_UNSUPPORTED = 1;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_WAITING_FOR_OBSERVATION = 2;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_APPLYING = 3;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_VERIFYING = 4;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_CONVERGED = 5;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_HELD = 6;
    MINER_CHANNEL_CONFIG_LIFECYCLE_STATE_FAILED = 7;
}

message MinerChannelPoolDesiredConfig {
    int64 primary_pool_id = 1 [(buf.validate.field).int64.gt = 0];
    optional int64 backup_1_pool_id = 2 [(buf.validate.field).int64.gt = 0];
    optional int64 backup_2_pool_id = 3 [(buf.validate.field).int64.gt = 0];
}

message MinerChannelDesiredConfig {
    MinerChannelPoolDesiredConfig pools = 1;
}

message MinerChannelConfigStatus {
    MinerChannelConfigDimension dimension = 1;
    bool supported = 2;
    MinerChannelConfigLifecycleState state = 3;
    int32 retry_count = 4;
    string last_error = 5;
    google.protobuf.Timestamp last_dispatched_at = 6;
    google.protobuf.Timestamp confirmed_at = 7;
    google.protobuf.Timestamp observed_at = 8;
}

message MinerChannelConfigProgress {
    MinerChannelConfigDimension dimension = 1;
    int32 targeted_count = 2;
    int32 unsupported_count = 3;
    int32 waiting_count = 4;
    int32 applying_count = 5;
    int32 verifying_count = 6;
    int32 converged_count = 7;
    int32 held_count = 8;
    int32 failed_count = 9;
}

message MinerChannelFirmwareStatus {
    string target_firmware_file_id = 1;
    string target_firmware_version = 2;
    string current_firmware_version = 3;
    MinerChannelFirmwareRolloutState state = 4;
    int32 retry_count = 5;
    string last_error = 6;
    google.protobuf.Timestamp last_dispatched_at = 7;
    google.protobuf.Timestamp confirmed_at = 8;
    google.protobuf.Timestamp observed_at = 9;
}

message MinerChannelFirmwareProgress {
    int32 targeted_count = 1;
    int32 complete_count = 2;
    int32 queued_count = 3;
    int32 updating_count = 4;
    int32 verifying_count = 5;
    int32 needs_attention_count = 6;
    int32 unknown_count = 7;
}

// MinerChannelSummary is the lightweight miner channel shape for list and per-device
// contexts where repeating explicit members would make responses too large.
message MinerChannelSummary {
    reserved 7;
    reserved "desired_firmware_file_id";

    int64 id = 1;
    string label = 2;
    bool is_default = 3;

    optional int64 owner_user_id = 4;
    string owner_username = 5;
    google.protobuf.Timestamp expires_at = 6;

    MinerChannelDesiredConfig desired_config = 8;

    MinerChannelState state = 10;
    string purpose = 11;
    string source_actor_type = 12;
    string source_actor_id = 13;
    string idempotency_key = 14;

    google.protobuf.Timestamp created_at = 20;
    google.protobuf.Timestamp updated_at = 21;

    int64 explicit_member_count = 31;
    repeated MinerChannelFirmwareTarget firmware_targets = 32;
    MinerChannelFirmwareProgress firmware_progress = 33;
    repeated MinerChannelConfigProgress config_progress = 34;
}

message MinerChannelFirmwareTarget {
    string manufacturer = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    string model = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    string firmware_file_id = 3 [(buf.validate.field).string.max_len = 255];
}

// MinerChannel is the full read shape returned by get and mutating miner channel RPCs.
message MinerChannel {
    MinerChannelSummary summary = 1;
    repeated MinerChannelMember members = 2;
    repeated MinerChannelFirmwareTarget firmware_targets = 3;
}

message MinerChannelDeviceDisplay {
    reserved 7;
    reserved "site_label";

    string name = 1;
    string worker_name = 2;
    string manufacturer = 3;
    string model = 4;
    string ip_address = 5;
    string serial_number = 6;
    string firmware_version = 8;
}

// MinerChannelMember is an explicit non-default miner channel membership row. Default
// miner channel membership is sparse and derived from devices without a row here.
message MinerChannelMember {
    reserved 3;
    reserved "site_id";

    int64 miner_channel_id = 1;
    string device_identifier = 2;
    google.protobuf.Timestamp added_at = 4;
    MinerChannelDeviceDisplay display = 5;
    MinerChannelFirmwareStatus firmware_status = 6;
    repeated MinerChannelConfigStatus config_statuses = 7;
}

message MinerChannelDeviceIdentifierList {
    repeated string device_identifiers = 1 [(buf.validate.field).repeated = {
        max_items: 10000
        items: {string: {min_len: 1, max_len: 256}}
    }];
}

message MinerChannelDeviceSelector {
    reserved 4;
    reserved "site_id";

    int32 count = 1 [(buf.validate.field).int32 = {
        gt: 0
        lte: 10000
    }];
    optional string product = 2 [(buf.validate.field).string.max_len = 255];
    optional string model = 3 [(buf.validate.field).string.max_len = 255];
}

message CreateMinerChannelRequest {
    reserved 5;
    reserved "desired_firmware_file_id";

    string label = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    string purpose = 2 [(buf.validate.field).string = {min_len: 1, max_len: 1024}];

    // claim_ownership stamps owner_user_id/owner_username from the caller.
    // A request with expires_at also claims ownership.
    bool claim_ownership = 3;
    google.protobuf.Timestamp expires_at = 4;

    MinerChannelDesiredConfig desired_config = 6;

    oneof initial_members {
        MinerChannelDeviceIdentifierList device_identifiers = 7;
        int64 source_device_set_id = 8 [(buf.validate.field).int64.gt = 0];
        MinerChannelDeviceSelector select = 10;
    }
    string idempotency_key = 9 [(buf.validate.field).string.max_len = 255];
}

message CreateMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message UpdateMinerChannelRequest {
    reserved 5;
    reserved "desired_firmware_file_id";

    option (buf.validate.message).cel = {
        id: "expires_at_set_or_clear"
        message: "expires_at and clear_expires_at cannot both be set"
        expression: "!(has(this.expires_at) && this.clear_expires_at)"
    };
    option (buf.validate.message).cel = {
        id: "desired_config_set_or_clear"
        message: "desired_config and clear_desired_config cannot both be set"
        expression: "!(has(this.desired_config) && this.clear_desired_config)"
    };

    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
    optional string label = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    optional string purpose = 3 [(buf.validate.field).string = {min_len: 1, max_len: 1024}];
    google.protobuf.Timestamp expires_at = 4;
    MinerChannelDesiredConfig desired_config = 6;
    bool clear_expires_at = 7;
    bool clear_desired_config = 8;
}

message UpdateMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message SetMinerChannelFirmwareTargetRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
    optional string manufacturer = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    optional string model = 3 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    optional string firmware_file_id = 4 [(buf.validate.field).string.max_len = 255];
}

message SetMinerChannelFirmwareTargetResponse {
    MinerChannel miner_channel = 1;
}

message AddDevicesToMinerChannelRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
    repeated string device_identifiers = 2 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 10000
        items: {string: {min_len: 1, max_len: 256}}
    }];
}

message AddDevicesToMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message RemoveDevicesFromMinerChannelRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
    repeated string device_identifiers = 2 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 10000
        items: {string: {min_len: 1, max_len: 256}}
    }];
}

message RemoveDevicesFromMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message ReleaseMinerChannelRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
}

message ReleaseMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message DeleteMinerChannelRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
}

message DeleteMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message GetMinerChannelRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
}

message GetMinerChannelResponse {
    MinerChannel miner_channel = 1;
}

message ListMinerChannelsRequest {
    bool include_released = 1;
    int32 page_size = 2 [(buf.validate.field).int32 = {gte: 0, lte: 500}];
    string page_token = 3 [(buf.validate.field).string.max_len = 2048];
    string search = 4 [(buf.validate.field).string.max_len = 255];
}

message ListMinerChannelsResponse {
    repeated MinerChannelSummary miner_channels = 1;
    string next_page_token = 2;
    int32 total_count = 3;
}

message GetMyMinerChannelsRequest {
    bool include_released = 1;
    int32 page_size = 2 [(buf.validate.field).int32 = {gte: 0, lte: 500}];
    string page_token = 3 [(buf.validate.field).string.max_len = 2048];
    string search = 4 [(buf.validate.field).string.max_len = 255];
}

message GetMyMinerChannelsResponse {
    repeated MinerChannelSummary miner_channels = 1;
    string next_page_token = 2;
    int32 total_count = 3;
}

message ListDevicesRequest {
    reserved 1;
    reserved "site_id";

    int32 page_size = 2 [(buf.validate.field).int32 = {gte: 0, lte: 500}];
    string page_token = 3 [(buf.validate.field).string.max_len = 2048];
    MinerChannelDeviceFilter filter = 4;
}

enum MinerChannelDeviceAssignment {
    MINER_CHANNEL_DEVICE_ASSIGNMENT_UNSPECIFIED = 0;
    MINER_CHANNEL_DEVICE_ASSIGNMENT_AVAILABLE = 1;
    MINER_CHANNEL_DEVICE_ASSIGNMENT_RESERVED = 2;
}

message MinerChannelDeviceFilter {
    reserved 7, 8;
    reserved "site_ids", "include_unassigned_site";

    repeated MinerChannelDeviceAssignment assignments = 1;
    repeated int64 miner_channel_ids = 2;
    repeated int64 owner_user_ids = 3;
    bool include_unowned = 4;
    repeated string manufacturers = 5 [(buf.validate.field).repeated.items.string.max_len = 255];
    repeated string models = 6 [(buf.validate.field).repeated.items.string.max_len = 255];
    string search = 9 [(buf.validate.field).string.max_len = 255];
}

message MinerChannelDevice {
    reserved 2;
    reserved "site_id";

    string device_identifier = 1;
    MinerChannelSummary effective_miner_channel = 3;
    MinerChannelDeviceDisplay display = 4;
    MinerChannelFirmwareStatus firmware_status = 5;
    repeated MinerChannelConfigStatus config_statuses = 6;
}

message ListDevicesResponse {
    repeated MinerChannelDevice devices = 1;
    string next_page_token = 2;
    int32 total_count = 3;
    int32 available_count = 4;
    int32 reserved_count = 5;
}

message AdminReassignRequest {
    int64 target_miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
    repeated string device_identifiers = 2 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 10000
        items: {string: {min_len: 1, max_len: 256}}
    }];
}

message AdminReassignResponse {
    MinerChannel miner_channel = 1;
}

message AdminReleaseMinerChannelRequest {
    int64 miner_channel_id = 1 [(buf.validate.field).int64.gt = 0];
}

message AdminReleaseMinerChannelResponse {
    MinerChannel miner_channel = 1;
}
