syntax = "proto3";

package pools.v1;

import "pools/v1/pools.proto";

service PoolConfigurationsService {
  rpc ListPoolConfigurations(ListPoolConfigurationsRequest) returns (ListPoolConfigurationsResponse);

  rpc GetPoolConfiguration(GetPoolConfigurationRequest) returns (GetPoolConfigurationResponse);

  rpc UpsertPoolConfiguration(UpsertPoolConfigurationRequest) returns (UpsertPoolConfigurationResponse);

  rpc DeletePoolConfiguration(DeletePoolConfigurationRequest) returns (DeletePoolConfigurationResponse);
}

message PoolConfigurationBase {
  string name = 1;
  string description = 2;
}

message PoolConfigurationEntry {
  int64 id = 1;
  int32 priority = 2; // 0=default, 1=backup1, 2=backup2
}

message PoolConfiguration {
  int64  id = 1;
  string name = 2;
  string description = 3;
}

message PoolWithPriority {
  Pool pool = 1;
  int32 priority = 2;
}

message PoolConfigurationWithPools {
  PoolConfiguration configuration = 1;
  repeated PoolWithPriority pools = 2;
}

message ListPoolConfigurationsRequest {
}

message ListPoolConfigurationsResponse {
  repeated PoolConfigurationWithPools configurations = 1;
}

message GetPoolConfigurationRequest {
  int64 id = 1;
}

message GetPoolConfigurationResponse {
  PoolConfigurationWithPools configuration = 1;
}

message UpsertPoolConfigurationRequest {
  PoolConfigurationBase configuration = 1;
  repeated PoolConfigurationEntry pools = 2;
}

message UpsertPoolConfigurationResponse {
  PoolConfigurationWithPools configuration = 1;
}

message DeletePoolConfigurationRequest {
  int64 configuration_id = 1;
}

message DeletePoolConfigurationResponse {
}
